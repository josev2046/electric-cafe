<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-3K Analog Sequencer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- KORG MS-SERIES AESTHETICS --- */
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@500;700;900&display=swap');

        body { 
            background-color: #1e1e1e; 
            color: #e5e3d8; 
            font-family: 'Inter', sans-serif; 
            text-transform: uppercase;
            padding: 2rem 1rem;
        }

        /* --- WOODEN END CHEEKS --- */
        .synth-wrapper {
            box-shadow: 0 30px 60px -10px rgba(0,0,0,0.9), 0 15px 20px -5px rgba(0,0,0,0.8);
            border-radius: 10px;
        }

        .wood-cheek {
            width: 44px;
            background: linear-gradient(90deg, #2b1104 0%, #4a210d 15%, #5e2c13 40%, #4a210d 65%, #6e3518 85%, #2b1104 100%);
            position: relative;
            z-index: 20;
            border-top: 1px solid #824322;
            border-bottom: 2px solid #1a0801;
        }
        .wood-left {
            border-radius: 10px 0 0 10px;
            border-right: 6px solid #080808;
            box-shadow: inset 4px 0 6px rgba(255,255,255,0.05), inset -4px 0 10px rgba(0,0,0,0.8);
        }
        .wood-right {
            border-radius: 0 10px 10px 0;
            border-left: 6px solid #080808;
            box-shadow: inset -4px 0 6px rgba(0,0,0,0.8), inset 2px 0 6px rgba(255,255,255,0.05);
        }

        /* Wood panel screws */
        .wood-cheek::before, .wood-cheek::after {
            content: ''; position: absolute; width: 12px; height: 12px;
            background: linear-gradient(45deg, #111, #444);
            border-radius: 50%; left: 16px; 
            box-shadow: inset 0 -2px 3px #000, 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid #000;
        }
        .wood-cheek::before { top: 40px; }
        .wood-cheek::after { bottom: 40px; }
        
        /* --- MAIN CHASSIS --- */
        .chassis {
            background: #111; 
            border-top: 8px solid #080808;
            border-bottom: 8px solid #080808;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.05), inset 0 -2px 10px rgba(0,0,0,1);
            padding: 24px;
            position: relative;
        }
        
        /* --- ENGRAVED LOGO --- */
        .engraved-logo {
            position: absolute;
            top: 20px;
            right: 30px;
            width: 140px;
            height: auto;
            /* 1. Grayscale to remove colors
               2. Massive Brightness/Contrast boost to completely destroy the paper background shadows
               3. Invert to make the pure white background become pure black (invisible)
               4. Drop-shadow to cut it into the metal */
            filter: grayscale(1) brightness(1.8) contrast(5) invert(1) drop-shadow(0px -1px 1px rgba(0,0,0,1));
            mix-blend-mode: screen;
            opacity: 0.7; 
            pointer-events: none;
            z-index: 50;
        }

        .korg-panel { 
            border: 2px solid #e5e3d8; 
            border-radius: 2px;
            margin-bottom: 2rem;
            position: relative;
            padding: 16px 12px 12px 12px;
            background: #151515;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            z-index: 20;
        }
        
        .korg-header {
            background: #e5e3d8;
            color: #111;
            font-weight: 900;
            padding: 2px 12px;
            position: absolute;
            top: -12px;
            left: 16px;
            font-size: 13px;
            letter-spacing: 1.5px;
            border-radius: 2px;
        }

        /* Sequencer Step Columns */
        .step-col { 
            display: flex; flex-direction: column; gap: 0.5rem; 
            border-right: 1px solid #2a2a2a; 
            padding: 0.75rem 0.5rem; align-items: center; min-width: 65px; flex: 1;
            transition: background 0.1s;
        }
        .step-col:last-child { border-right: none; }
        .step-col.active { background: #1e1e1e; }
        
        /* Analog LEDs */
        .led { 
            width: 14px; height: 14px; border-radius: 50%;
            background: #3a0505; 
            border: 2px solid #000; margin-bottom: 6px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 0px rgba(255,255,255,0.1);
        }
        .step-col.active .led { 
            background: #ff2a2a; 
            box-shadow: 0 0 12px #ff2a2a, inset 0 2px 4px rgba(255,255,255,0.6); 
            border-color: #222;
        }
        
        /* Hardware Faders */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]:focus { outline: none; }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; cursor: pointer; 
            background: #000; border: 1px solid #222; border-radius: 3px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.9);
        }
        
        /* Fader Caps */
        input[type=range]::-webkit-slider-thumb {
            height: 22px; width: 14px; background: #1a1a1a; cursor: pointer; -webkit-appearance: none; 
            margin-top: -9px; border-radius: 2px;
            border: 1px solid #000;
            border-top: 3px solid #e5e3d8; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.8);
        }
        
        /* Pitch Wheel special styling */
        #pitchWheel::-webkit-slider-thumb { 
            width: 24px; height: 40px; margin-top: -18px; 
            background: #111; border: 1px solid #333; border-bottom: 4px solid #000;
            border-top: 4px solid #000; border-radius: 4px;
        }

        /* Vertical Step Sliders */
        input[type=range].vertical { 
            width: 24px; height: 80px; writing-mode: bt-lr; -webkit-appearance: slider-vertical; 
        }
        
        /* Drum Pads */
        input[type="checkbox"] { display: none; }
        .drum-pad { 
            width: 100%; height: 28px; background: #222; 
            border: 2px solid #111; border-bottom-width: 4px; border-radius: 3px;
            cursor: pointer; transition: 0.05s; color: #666; font-size: 11px; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
        }
        input[type="checkbox"]:checked + .drum-pad { 
            background: #ff2a2a; color: #fff; 
            border-bottom-width: 2px; border-top-width: 4px; 
            border-color: #8a130e;
        }
        
        /* Digital Readout Inputs */
        .pitch-input { 
            width: 48px; background: #080808; color: #ff2a2a; border: 2px inset #222; 
            text-align: center; font-weight: bold; font-size: 0.85rem; padding: 4px 0; 
            border-radius: 2px; font-family: monospace; 
        }
        .pitch-input:focus { outline: none; border-color: #ff2a2a; }

        /* Buttons & Waveforms */
        .wave-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 32px; background: #1a1a1a; color: #e5e3d8;
            border: 2px solid #111; border-bottom-width: 4px;
            cursor: pointer; transition: all 0.05s; border-radius: 3px;
        }
        .wave-btn svg { stroke-width: 2; }
        .wave-btn.active { 
            background: #e5e3d8; color: #111; 
            border-bottom-width: 2px; border-top-width: 4px; border-color: #999;
        }

        .action-btn {
            background: #e5e3d8; color: #111; font-weight: 900;
            border: 2px solid #fff; border-bottom: 4px solid #aaa;
            border-radius: 3px; cursor: pointer; transition: all 0.05s;
            padding: 0 24px; display: flex; align-items: center; justify-content: center;
        }
        .action-btn:active, .action-btn.active-press {
            border-bottom: 2px solid #aaa; border-top: 4px solid #fff; transform: translateY(2px);
        }

        .btn-small {
            background: #2a2a2a; color: #e5e3d8; font-weight: 900;
            border: 2px solid #111; border-bottom: 3px solid #000;
            border-radius: 3px; cursor: pointer; transition: all 0.05s;
            font-size: 10px; padding: 4px 12px; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-small:active { border-bottom: 1px solid #000; border-top: 3px solid #111; transform: translateY(1px); }

        .txt-korg-yellow { color: #dca824; }
        .txt-korg-red { color: #ff2a2a; }
        
        select { 
            -webkit-appearance: none; -moz-appearance: none; appearance: none; 
            background: #080808; color: #e5e3d8; border: 2px inset #222;
            padding: 6px 12px; border-radius: 2px; font-weight: bold; cursor: pointer;
        }
        
        .module-group {
            border: 1px solid #333; padding: 12px; border-radius: 2px;
            position: relative; background: #181818;
        }
        .module-group-title {
            position: absolute; top: -8px; left: 8px; background: #111; padding: 0 6px;
            font-size: 10px; font-weight: 700; color: #888; letter-spacing: 1px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start">

    <div class="w-full max-w-[84rem] flex synth-wrapper">
        
        <div class="wood-cheek wood-left"></div>

        <div class="flex-1 flex flex-col gap-4 chassis">
            
            <img src="image.png" alt="Creature Logo" class="engraved-logo">

            <div class="flex flex-wrap justify-between items-end mb-8 px-2 gap-y-8 relative z-20">
                <div>
                    <h1 class="text-5xl font-black tracking-tighter" style="font-family: 'Archivo Black', sans-serif;">
                        <span class="txt-korg-red">MS</span>-3000
                    </h1>
                    <p class="text-[11px] font-bold tracking-[0.25em] mt-2 text-[#888]">PROGRAMMABLE ANALOG SEQUENCER</p>
                </div>
                
                <div class="flex flex-wrap items-end gap-6 pt-4 mr-32">
                    <div class="module-group flex flex-col gap-3 mt-2">
                        <span class="module-group-title">MASTER ROUTING</span>
                        <div class="flex items-center gap-4">
                            <select id="masterPlayMode" class="text-[11px] h-8">
                                <option value="forward">SEQ: FORWARD</option>
                                <option value="reverse">SEQ: REVERSE</option>
                                <option value="pingpong">SEQ: PING-PONG</option>
                                <option value="random">SEQ: RANDOM</option>
                            </select>
                            <div id="keyboard" class="flex w-64 h-8 gap-1"></div>
                        </div>
                    </div>

                    <div class="module-group flex items-center gap-6 mt-2">
                        <span class="module-group-title">CLOCK & BEND</span>
                        <div class="flex flex-col items-center w-24">
                            <input type="range" id="pitchWheel" min="-2" max="2" value="0" step="0.01">
                            <span class="text-[10px] mt-3 font-bold text-[#888]">PITCH BEND</span>
                        </div>
                        <div class="flex flex-col items-center w-24">
                            <input type="range" id="tempoSlider" min="80" max="180" value="120">
                            <span class="text-[10px] mt-3 font-bold text-[#888]">TEMPO: <span id="tempoDisplay" class="text-white">120</span></span>
                        </div>
                    </div>

                    <div class="flex gap-2 mt-2">
                        <button id="playBtn" class="action-btn text-xl h-14 shadow-lg w-40">PLAY / STOP</button>
                        <button id="syncBtn" class="action-btn text-sm h-14 shadow-lg w-20" title="Snap all sequences back to step 1">SYNC</button>
                    </div>
                </div>
            </div>

            <div class="korg-panel">
                <div class="korg-header">VCO 1 / VCF 1</div>
                
                <div class="flex flex-col gap-3 px-2 pb-4 border-b border-[#2a2a2a] mb-4">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <button class="btn-small mute-btn h-6" data-track="A">MUTE</button>
                            <button class="btn-small rand-btn h-6" data-track="A">RANDOM</button>
                            <select class="track-mode-select text-[10px] h-6 py-0 px-2" data-track="A">
                                <option value="forward">MODE: FWD</option>
                                <option value="reverse">MODE: REV</option>
                                <option value="pingpong">MODE: PING</option>
                                <option value="random">MODE: RAND</option>
                            </select>
                        </div>
                        <div class="font-black text-xl tracking-widest txt-korg-yellow">TRACK A</div>
                    </div>
                    
                    <div class="flex justify-between items-center mt-2">
                        <div class="flex gap-2" id="waveGroupA">
                            <button class="wave-btn active" data-track="A" data-wave="sawtooth"><svg width="18" height="18" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M2 10 L10 2 L10 10 Z"/></svg></button>
                            <button class="wave-btn" data-track="A" data-wave="square"><svg width="18" height="18" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 10 L1 3 L6 3 L6 10 L11 10"/></svg></button>
                            <button class="wave-btn" data-track="A" data-wave="triangle"><svg width="18" height="18" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 10 L6 2 L11 10"/></svg></button>
                            <button class="wave-btn" data-track="A" data-wave="sine"><svg width="18" height="18" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 6 Q 3.5 1 6 6 T 11 6"/></svg></button>
                        </div>
                        <div class="flex gap-8">
                            <div class="flex flex-col items-center w-20">
                                <input type="range" id="noiseA" min="0" max="1" value="0" step="0.01">
                                <span class="text-[10px] mt-2 font-bold text-[#888]">NOISE MIX</span>
                            </div>
                            <div class="flex flex-col items-center w-20">
                                <input type="range" id="cutoffA" min="50" max="2500" value="200">
                                <span class="text-[10px] mt-2 font-bold text-[#888]">VCF CUTOFF</span>
                            </div>
                            <div class="flex flex-col items-center w-20">
                                <input type="range" id="decayA" min="0.05" max="0.5" value="0.15" step="0.01">
                                <span class="text-[10px] mt-2 font-bold text-[#888]">EG DECAY</span>
                            </div>
                            <div class="flex flex-col items-center w-20">
                                <input type="range" id="octaveA" min="-2" max="2" value="0">
                                <span class="text-[10px] mt-2 font-bold text-[#888]">OCTAVE</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="flex overflow-x-auto w-full px-2 pb-2" id="gridA"></div>
            </div>

            <div class="korg-panel">
                <div class="korg-header">VCO 2 / VCF 2</div>
                
                <div class="flex flex-col gap-3 px-2 pb-4 border-b border-[#2a2a2a] mb-4">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <button class="btn-small mute-btn h-6" data-track="B">MUTE</button>
                            <button class="btn-small rand-btn h-6" data-track="B">RANDOM</button>
                            <select class="track-mode-select text-[10px] h-6 py-0 px-2" data-track="B">
                                <option value="forward">MODE: FWD</option>
                                <option value="reverse">MODE: REV</option>
                                <option value="pingpong">MODE: PING</option>
                                <option value="random">MODE: RAND</option>
                            </select>
                        </div>
                        <div class="font-black text-xl tracking-widest txt-korg-yellow">TRACK B</div>
                    </div>
                    
                    <div class="flex justify-between items-center mt-2">
                        <div class="flex gap-2" id="waveGroupB">
                            <button class="wave-btn" data-track="B" data-wave="sawtooth"><svg width="18" height="18" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M2 10 L10 2 L10 10 Z"/></svg></button>
                            <button class="wave-btn active" data-track="B" data-wave="square"><svg width="18" height="18" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 10 L1 3 L6 3 L6 10 L11 10"/></svg></button>
                            <button class="wave-btn" data-track="B" data-wave="triangle"><svg width="18" height="18" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 10 L6 2 L11 10"/></svg></button>
                            <button class="wave-btn" data-track="B" data-wave="sine"><svg width="18" height="18" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 6 Q 3.5 1 6 6 T 11 6"/></svg></button>
                        </div>
                        <div class="flex gap-8">
                            <div class="flex flex-col items-center w-20">
                                <input type="range" id="noiseB" min="0" max="1" value="0" step="0.01">
                                <span class="text-[10px] mt-2 font-bold text-[#888]">NOISE MIX</span>
                            </div>
                            <div class="flex flex-col items-center w-20">
                                <input type="range" id="cutoffB" min="50" max="2500" value="100">
                                <span class="text-[10px] mt-2 font-bold text-[#888]">VCF CUTOFF</span>
                            </div>
                            <div class="flex flex-col items-center w-20">
                                <input type="range" id="decayB" min="0.05" max="0.5" value="0.2" step="0.01">
                                <span class="text-[10px] mt-2 font-bold text-[#888]">EG DECAY</span>
                            </div>
                            <div class="flex flex-col items-center w-20">
                                <input type="range" id="octaveB" min="-2" max="2" value="-1">
                                <span class="text-[10px] mt-2 font-bold text-[#888]">OCTAVE</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="flex overflow-x-auto w-full px-2 pb-2" id="gridB"></div>
            </div>

            <div class="korg-panel">
                <div class="korg-header">RHYTHM GENERATOR</div>
                
                <div class="flex justify-between items-center px-2 pb-4 border-b border-[#2a2a2a] mb-4">
                    <div class="flex items-center gap-3">
                        <button class="btn-small mute-btn h-6" data-track="Drums">MUTE</button>
                        <button class="btn-small rand-btn h-6" data-track="Drums">RANDOM</button>
                        <select class="track-mode-select text-[10px] h-6 py-0 px-2" data-track="Drums">
                            <option value="forward">MODE: FWD</option>
                            <option value="reverse">MODE: REV</option>
                            <option value="pingpong">MODE: PING</option>
                            <option value="random">MODE: RAND</option>
                        </select>
                    </div>
                    
                    <div class="flex gap-8">
                        <div class="flex flex-col items-center w-24">
                            <input type="range" id="drumNoiseDecay" min="0.01" max="0.25" value="0.05" step="0.01">
                            <span class="text-[10px] mt-2 font-bold text-[#888]">NOISE DECAY</span>
                        </div>
                        <div class="flex flex-col items-center w-24">
                            <input type="range" id="kickPitch" min="100" max="250" value="150">
                            <span class="text-[10px] mt-2 font-bold text-[#888]">KICK TUNE</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex overflow-x-auto w-full px-2 pb-2" id="gridDrums"></div>
            </div>
        </div>
        
        <div class="wood-cheek wood-right"></div>
        
    </div>

    <script>
        let audioCtx, isPlaying = false, nextNoteTime = 0, timerID;
        const lookahead = 25.0, scheduleAheadTime = 0.1, baseFreq = 65.41, NUM_STEPS = 16;
        let rootNoteOffset = 0, globalPitchBend = 0;

        const tracks = {
            A: { muted: false, wave: 'sawtooth', step: 0, dir: 1, mode: 'forward', pitch: [12, 0, 12, 0, 15, 0, 12, 0, 19, 0, 15, 0, 12, 0, 15, 0], filter: [80, 0, 40, 0, 80, 0, 40, 0, 100, 0, 80, 0, 40, 0, 80, 0], elements: [] },
            B: { muted: false, wave: 'square', step: 0, dir: 1, mode: 'forward', pitch: [0, 0, 0, 0, 3, 3, 3, 3, 7, 7, 7, 7, 5, 5, 5, 5], filter: [40, 40, 60, 40, 40, 40, 60, 40, 50, 50, 80, 50, 40, 40, 60, 40], elements: [] },
            Drums: { muted: false, step: 0, dir: 1, mode: 'forward', kick: [true, false, false, false, true, false, false, false, true, false, false, false, true, false, false, false], snare: [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, false], hat: [0, 60, 40, 60, 0, 60, 40, 60, 0, 60, 40, 60, 0, 60, 40, 60], elements: [] }
        };

        function renderSynthGrid(containerId, trackData, trackId) {
            const container = document.getElementById(containerId);
            for (let i = 0; i < NUM_STEPS; i++) {
                const col = document.createElement('div');
                col.className = 'step-col';
                col.innerHTML = `
                    <div class="led"></div>
                    <span class="text-[10px] font-bold text-[#666] mt-[-2px] mb-3">${(i+1).toString().padStart(2, '0')}</span>
                    <input type="number" class="pitch-input" data-track="${trackId}" data-step="${i}" data-param="pitch" value="${trackData.pitch[i]}">
                    <div class="mt-5 w-full flex justify-center h-[80px]">
                        <input type="range" class="vertical" orient="vertical" data-track="${trackId}" data-step="${i}" data-param="filter" min="0" max="100" value="${trackData.filter[i]}">
                    </div>
                `;
                container.appendChild(col);
                trackData.elements.push(col);
            }
        }

        function renderDrumGrid(containerId, trackData, trackId) {
            const container = document.getElementById(containerId);
            for (let i = 0; i < NUM_STEPS; i++) {
                const col = document.createElement('div');
                col.className = 'step-col';
                col.innerHTML = `
                    <div class="led"></div>
                    <span class="text-[10px] font-bold text-[#666] mt-[-2px] mb-3">${(i+1).toString().padStart(2, '0')}</span>
                    <label class="w-full relative mb-1"><input type="checkbox" data-track="${trackId}" data-step="${i}" data-param="kick" ${trackData.kick[i] ? 'checked' : ''}><div class="drum-pad">BD</div></label>
                    <label class="w-full relative mb-3"><input type="checkbox" data-track="${trackId}" data-step="${i}" data-param="snare" ${trackData.snare[i] ? 'checked' : ''}><div class="drum-pad">SD</div></label>
                    <div class="mt-2 w-full flex justify-center h-[60px]">
                        <input type="range" class="vertical" orient="vertical" data-track="${trackId}" data-step="${i}" data-param="hat" min="0" max="100" value="${trackData.hat[i]}">
                    </div>
                `;
                container.appendChild(col);
                trackData.elements.push(col);
            }
        }

        renderSynthGrid('gridA', tracks.A, 'A');
        renderSynthGrid('gridB', tracks.B, 'B');
        renderDrumGrid('gridDrums', tracks.Drums, 'Drums');

        // Mute Buttons
        document.querySelectorAll('.mute-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const trackId = e.target.dataset.track;
                tracks[trackId].muted = !tracks[trackId].muted;
                if (tracks[trackId].muted) {
                    e.target.style.background = '#e0261c';
                    e.target.style.color = '#fff';
                    e.target.style.borderColor = '#8a130e';
                } else {
                    e.target.style.background = '';
                    e.target.style.color = '';
                    e.target.style.borderColor = '';
                }
            });
        });

        // Rand Buttons
        document.querySelectorAll('.rand-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const trackId = e.target.dataset.track;
                const trackData = tracks[trackId];
                
                for (let i = 0; i < NUM_STEPS; i++) {
                    if (trackId === 'A' || trackId === 'B') {
                        trackData.pitch[i] = Math.random() > 0.4 ? Math.floor(Math.random() * 24) : 0;
                        trackData.filter[i] = Math.floor(Math.random() * 100);
                        const col = trackData.elements[i];
                        col.querySelector('[data-param="pitch"]').value = trackData.pitch[i];
                        col.querySelector('[data-param="filter"]').value = trackData.filter[i];
                    } else if (trackId === 'Drums') {
                        trackData.kick[i] = Math.random() > 0.70;
                        trackData.snare[i] = Math.random() > 0.85;
                        trackData.hat[i] = Math.random() > 0.3 ? Math.floor(Math.random() * 100) : 0;
                        const col = trackData.elements[i];
                        col.querySelector('[data-param="kick"]').checked = trackData.kick[i];
                        col.querySelector('[data-param="snare"]').checked = trackData.snare[i];
                        col.querySelector('[data-param="hat"]').value = trackData.hat[i];
                    }
                }
            });
        });

        document.querySelectorAll('.track-mode-select').forEach(select => {
            select.addEventListener('change', (e) => tracks[e.target.dataset.track].mode = e.target.value);
        });

        document.getElementById('masterPlayMode').addEventListener('change', (e) => {
            const newMode = e.target.value;
            ['A', 'B', 'Drums'].forEach(trackId => {
                tracks[trackId].mode = newMode;
                document.querySelector(`.track-mode-select[data-track="${trackId}"]`).value = newMode;
            });
        });

        // SYNC Button
        document.getElementById('syncBtn').addEventListener('click', (e) => {
            const btn = e.target;
            btn.classList.add('active-press');
            setTimeout(() => btn.classList.remove('active-press'), 100);

            ['A', 'B', 'Drums'].forEach(trackId => {
                if (tracks[trackId].mode === 'reverse') {
                    tracks[trackId].step = NUM_STEPS - 1;
                } else {
                    tracks[trackId].step = 0;
                }
                tracks[trackId].dir = 1;
            });
        });

        const pitchWheel = document.getElementById('pitchWheel');
        pitchWheel.addEventListener('input', (e) => globalPitchBend = parseFloat(e.target.value));
        const snapPitchWheel = () => { pitchWheel.value = 0; globalPitchBend = 0; };
        pitchWheel.addEventListener('mouseup', snapPitchWheel);
        pitchWheel.addEventListener('touchend', snapPitchWheel);
        pitchWheel.addEventListener('mouseleave', (e) => { if (e.buttons > 0) snapPitchWheel(); });

        document.querySelectorAll('.wave-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const target = e.currentTarget, trackId = target.dataset.track, waveType = target.dataset.wave;
                tracks[trackId].wave = waveType;
                document.querySelectorAll(`#waveGroup${trackId} .wave-btn`).forEach(b => b.classList.remove('active'));
                target.classList.add('active');
            });
        });

        document.body.addEventListener('input', (e) => {
            if(!e.target.dataset.track || e.target.id === 'pitchWheel' || e.target.classList.contains('track-mode-select')) return;
            const track = e.target.dataset.track, step = parseInt(e.target.dataset.step), param = e.target.dataset.param;
            tracks[track][param][step] = e.target.type === 'checkbox' ? e.target.checked : parseFloat(e.target.value) || 0;
        });

        // Volca-Style 12-key Keyboard
        const keyboardContainer = document.getElementById('keyboard');
        const notes = [
            {n: 'C', c: 'w'}, {n: 'C#', c: 'b'}, {n: 'D', c: 'w'}, {n: 'D#', c: 'b'}, 
            {n: 'E', c: 'w'}, {n: 'F', c: 'w'}, {n: 'F#', c: 'b'}, {n: 'G', c: 'w'}, 
            {n: 'G#', c: 'b'}, {n: 'A', c: 'w'}, {n: 'A#', c: 'b'}, {n: 'B', c: 'w'}
        ];
        notes.forEach((note, index) => {
            const btn = document.createElement('button');
            const isWhite = note.c === 'w';
            
            btn.className = `flex-1 text-[8px] font-bold border border-[#111] transition-all rounded-sm shadow-sm ${isWhite ? 'bg-[#e5e3d8] text-[#111]' : 'bg-[#222] text-[#e5e3d8]'}`;
            if(index === 0) {
                btn.style.background = '#dca824'; btn.style.color = '#111'; btn.style.borderColor = '#9e7816';
            }
            btn.innerText = note.n;
            btn.dataset.offset = index;
            
            btn.addEventListener('click', (e) => {
                rootNoteOffset = parseInt(e.target.dataset.offset);
                Array.from(keyboardContainer.children).forEach((child, i) => {
                    const originalIsWhite = notes[i].c === 'w';
                    child.style.background = originalIsWhite ? '#e5e3d8' : '#222';
                    child.style.color = originalIsWhite ? '#111' : '#e5e3d8';
                    child.style.borderColor = '#111';
                });
                e.target.style.background = '#dca824';
                e.target.style.color = '#111';
                e.target.style.borderColor = '#9e7816';
            });
            keyboardContainer.appendChild(btn);
        });

        let noiseBuffer = null;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = audioCtx.sampleRate * 2;
            noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
        }

        function playSynthVoice(trackData, step, time, octaveCtrlId, decayCtrlId, cutoffCtrlId, noiseCtrlId) {
            if (trackData.muted) return; 
            if (trackData.filter[step] <= 0 && trackData.pitch[step] === 0) return; 
            
            const filter = audioCtx.createBiquadFilter(), env = audioCtx.createGain();
            const baseCutoff = parseFloat(document.getElementById(cutoffCtrlId).value);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(baseCutoff + ((trackData.filter[step] / 100) * 4000), time);
            filter.frequency.exponentialRampToValueAtTime(Math.max(50, baseCutoff), time + 0.1);
            filter.Q.value = trackData.wave === 'square' ? 2 : 6; 
            
            const decay = parseFloat(document.getElementById(decayCtrlId).value);
            env.gain.setValueAtTime(0, time);
            const peakVol = (trackData.wave === 'sawtooth' || trackData.wave === 'square') ? 0.4 : 0.6;
            env.gain.linearRampToValueAtTime(peakVol, time + 0.01); 
            env.gain.exponentialRampToValueAtTime(0.01, time + decay);
            
            filter.connect(env); env.connect(audioCtx.destination);

            const osc = audioCtx.createOscillator();
            osc.type = trackData.wave;
            const octaveShift = parseInt(document.getElementById(octaveCtrlId).value);
            const totalPitch = trackData.pitch[step] + (octaveShift * 12) + rootNoteOffset + globalPitchBend;
            osc.frequency.value = baseFreq * Math.pow(2, totalPitch / 12);
            osc.connect(filter); osc.start(time); osc.stop(time + decay + 0.1);

            const noiseMix = parseFloat(document.getElementById(noiseCtrlId).value);
            if (noiseMix > 0) {
                const noiseSrc = audioCtx.createBufferSource(), noiseGain = audioCtx.createGain();
                noiseSrc.buffer = noiseBuffer; noiseGain.gain.value = noiseMix;
                noiseSrc.connect(noiseGain); noiseGain.connect(filter); 
                noiseSrc.start(time); noiseSrc.stop(time + decay + 0.1);
            }
        }

        function playDrumVoices(step, time) {
            const trackData = tracks.Drums;
            if (trackData.muted) return; 
            
            const nDecay = parseFloat(document.getElementById('drumNoiseDecay').value);

            if (trackData.kick[step]) {
                const kOsc = audioCtx.createOscillator(), kEnv = audioCtx.createGain();
                kOsc.frequency.setValueAtTime(parseFloat(document.getElementById('kickPitch').value), time);
                kOsc.frequency.exponentialRampToValueAtTime(40, time + 0.1);
                kEnv.gain.setValueAtTime(0, time);
                kEnv.gain.linearRampToValueAtTime(0.8, time + 0.005);
                kEnv.gain.exponentialRampToValueAtTime(0.01, time + 0.25);
                kOsc.connect(kEnv); kEnv.connect(audioCtx.destination);
                kOsc.start(time); kOsc.stop(time + 0.3);
            }

            if (trackData.snare[step]) {
                const nSrc = audioCtx.createBufferSource(), nFilt = audioCtx.createBiquadFilter(), nEnv = audioCtx.createGain();
                nSrc.buffer = noiseBuffer; nFilt.type = 'bandpass'; nFilt.frequency.value = 2500;
                nEnv.gain.setValueAtTime(0, time); nEnv.gain.linearRampToValueAtTime(0.6, time + 0.005); 
                nEnv.gain.exponentialRampToValueAtTime(0.01, time + (nDecay * 3)); 
                nSrc.connect(nFilt); nFilt.connect(nEnv); nEnv.connect(audioCtx.destination);
                nSrc.start(time); nSrc.stop(time + (nDecay * 3) + 0.1);
            }

            if (trackData.hat[step] > 0) {
                const hSrc = audioCtx.createBufferSource(), hFilt = audioCtx.createBiquadFilter(), hEnv = audioCtx.createGain();
                hSrc.buffer = noiseBuffer; hFilt.type = 'highpass'; hFilt.frequency.value = 7000;
                hEnv.gain.setValueAtTime(0, time); hEnv.gain.linearRampToValueAtTime((trackData.hat[step] / 100) * 0.4, time + 0.005); 
                hEnv.gain.exponentialRampToValueAtTime(0.01, time + nDecay);
                hSrc.connect(hFilt); hFilt.connect(hEnv); hEnv.connect(audioCtx.destination);
                hSrc.start(time); hSrc.stop(time + nDecay + 0.1);
            }
        }

        function getNextStepForTrack(trackId) {
            const t = tracks[trackId];
            switch(t.mode) {
                case 'reverse': return (t.step - 1 + NUM_STEPS) % NUM_STEPS;
                case 'pingpong':
                    if (t.dir === 1) {
                        if (t.step >= NUM_STEPS - 1) { t.dir = -1; return t.step - 1; }
                        return t.step + 1;
                    } else {
                        if (t.step <= 0) { t.dir = 1; return t.step + 1; }
                        return t.step - 1;
                    }
                case 'random': return Math.floor(Math.random() * NUM_STEPS);
                case 'forward': default: return (t.step + 1) % NUM_STEPS;
            }
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                
                playSynthVoice(tracks.A, tracks.A.step, nextNoteTime, 'octaveA', 'decayA', 'cutoffA', 'noiseA');
                playSynthVoice(tracks.B, tracks.B.step, nextNoteTime, 'octaveB', 'decayB', 'cutoffB', 'noiseB');
                playDrumVoices(tracks.Drums.step, nextNoteTime);
                
                nextNoteTime += 0.25 * (60.0 / parseInt(document.getElementById('tempoSlider').value));
                
                const stepsToAnimate = { A: tracks.A.step, B: tracks.B.step, Drums: tracks.Drums.step };
                
                requestAnimationFrame(() => { 
                    ['A', 'B', 'Drums'].forEach(trackId => {
                        tracks[trackId].elements.forEach(el => el.classList.remove('active'));
                        tracks[trackId].elements[stepsToAnimate[trackId]].classList.add('active');
                    });
                });
                
                ['A', 'B', 'Drums'].forEach(trackId => {
                    tracks[trackId].step = getNextStepForTrack(trackId);
                });
            }
            timerID = window.setTimeout(scheduler, lookahead);
        }

        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            initAudio();
            if (isPlaying) {
                window.clearTimeout(timerID); isPlaying = false; 
                playBtn.classList.remove('active-press');
                ['A', 'B', 'Drums'].forEach(trackId => tracks[trackId].elements.forEach(el => el.classList.remove('active')));
            } else {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                isPlaying = true; 
                
                ['A', 'B', 'Drums'].forEach(trackId => {
                    if (tracks[trackId].mode === 'reverse') tracks[trackId].step = NUM_STEPS - 1;
                    else if (tracks[trackId].mode === 'random') tracks[trackId].step = Math.floor(Math.random() * NUM_STEPS);
                    else tracks[trackId].step = 0;
                    tracks[trackId].dir = 1;
                });
                
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler(); 
                
                playBtn.classList.add('active-press');
            }
        });

        document.getElementById('tempoSlider').addEventListener('input', (e) => document.getElementById('tempoDisplay').innerText = e.target.value);
    </script>
</body>
</html>
