<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Cafe Groove Emulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- TERMINAL AESTHETICS --- */
        body { 
            background-color: #000000; 
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
            text-transform: uppercase;
        }
        
        .panel { 
            background: #000000; 
            border: 1px solid #00ff41; 
            border-radius: 0; 
        }
        
        .step-col { 
            display: flex; flex-direction: column; gap: 0.75rem; 
            background: #000000; border: 1px solid #003300; 
            padding: 0.5rem; align-items: center; min-width: 75px; 
        }
        
        .step-col.active { 
            background: #001a00; border-color: #00ff41; 
        }
        
        /* Square LEDs for retro feel */
        .led { 
            width: 12px; height: 12px; background: #000000; 
            border: 1px solid #003300; 
        }
        .step-col.active .led { 
            background: #00ff41; box-shadow: 0 0 8px #00ff41; border-color: #00ff41;
        }
        
        /* Custom Sliders */
        input[type=range] { 
            -webkit-appearance: none; background: transparent; width: 100%;
        }
        input[type=range]:focus { outline: none; }
        
        /* Horizontal Sliders */
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; cursor: pointer;
            background: #000000; border: 1px solid #00ff41;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 16px; width: 8px; background: #00ff41;
            cursor: pointer; -webkit-appearance: none; margin-top: -6px;
        }

        /* Vertical Sliders */
        input[type=range].vertical { 
            width: 12px; height: 60px; writing-mode: bt-lr; -webkit-appearance: slider-vertical; 
        }
        
        /* Checkboxes / Drum Pads */
        input[type="checkbox"] { display: none; }
        .drum-pad { 
            width: 100%; height: 30px; background: #000000; border: 1px solid #00ff41;
            cursor: pointer; transition: 0s; color: #00ff41;
        }
        .drum-pad:active { background: #00ff41; color: #000000; }
        input[type="checkbox"]:checked + .drum-pad { 
            background: #00ff41; color: #000000; box-shadow: 0 0 5px #00ff41; font-weight: bold;
        }
        
        .pitch-input { 
            width: 55px; background: #000000; color: #00ff41; border: 1px dashed #00ff41; 
            text-align: center; font-weight: bold; font-size: 0.85rem; padding: 2px 0; 
        }
        .pitch-input:focus { outline: none; border: 1px solid #00ff41; background: #001a00; }

        /* General text overrides */
        .txt-dim { color: #008f11; }
        .txt-bright { color: #00ff41; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="w-full max-w-6xl flex flex-col gap-4">
        <div class="panel p-4 flex flex-wrap justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-widest">Electric Cafe Groove Emulator</h1>
                <p class="txt-dim text-xs mt-1">Web Audio Sequencer & Synthesizer</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3 px-4 py-2 border border-[#00ff41]" title="Controls the speed of the track">
                    <label class="text-xs font-bold txt-dim">Tempo (BPM)</label>
                    <input type="range" id="tempoSlider" min="80" max="180" value="120" class="w-24">
                    <span id="tempoDisplay" class="font-bold w-8 text-right">120</span>
                </div>
                <button id="playBtn" class="bg-black text-[#00ff41] border border-[#00ff41] font-bold py-2 px-8 hover:bg-[#003300] transition-colors tracking-wider">
                    [ PLAY ]
                </button>
            </div>
        </div>

        <div class="panel p-4 overflow-x-auto">
            <div class="flex gap-2" id="sequencerGrid"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="panel p-4 flex flex-col gap-4">
                <h2 class="text-sm font-bold border-b border-[#00ff41] pb-2">Melody Settings (Synthesizer)</h2>
                
                <div class="flex items-center justify-between gap-4" title="Transposes the entire melody up or down by octaves">
                    <label class="text-xs font-bold txt-dim w-32">Octave Shift</label>
                    <input type="range" id="octaveShift" min="-2" max="2" value="0" class="flex-1">
                    <span id="octaveDisplay" class="font-bold w-6 text-right">0</span>
                </div>

                <div class="mt-1 pt-2 border-t border-[#003300]" title="Changes the root musical key of the sequence">
                    <label class="text-xs font-bold txt-dim mb-2 block">Root Key Selector</label>
                    <div id="keyboard" class="flex w-full h-8 gap-[2px]"></div>
                </div>

                <div class="mt-1 pt-2 border-t border-[#003300] flex flex-col gap-4">
                    <div class="flex items-center justify-between gap-4" title="Sets the baseline brightness of the synthesizer tone">
                        <label class="text-xs font-bold txt-dim w-32">Tone Brightness</label>
                        <input type="range" id="globalCutoff" min="50" max="1500" value="200" class="flex-1">
                    </div>
                    <div class="flex items-center justify-between gap-4" title="Controls how long the synth notes ring out before fading">
                        <label class="text-xs font-bold txt-dim w-32">Note Length</label>
                        <input type="range" id="globalDecay" min="0.05" max="0.5" value="0.15" step="0.01" class="flex-1">
                    </div>
                </div>
            </div>
            <div class="panel p-4 flex flex-col gap-4">
                <h2 class="text-sm font-bold border-b border-[#00ff41] pb-2">Drum Settings (Percussion)</h2>
                <div class="flex items-center justify-between gap-4" title="Adjusts how deep or punchy the kick drum sounds">
                    <label class="text-xs font-bold txt-dim w-32">Kick Drum Pitch</label>
                    <input type="range" id="kickPitch" min="100" max="250" value="150" class="flex-1">
                </div>
                <div class="flex items-center justify-between gap-4" title="Controls how long the snare and hi-hats sizzle">
                    <label class="text-xs font-bold txt-dim w-32">Snare/Hat Length</label>
                    <input type="range" id="noiseDecay" min="0.02" max="0.2" value="0.05" step="0.01" class="flex-1">
                </div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx, isPlaying = false, currentStep = 0, nextNoteTime = 0, timerID;
        const lookahead = 25.0, scheduleAheadTime = 0.1, baseFreq = 65.41, NUM_STEPS = 16;
        let rootNoteOffset = 0; // Defines the base key. 0 = C.
        
        const sequence = {
            pitch:  [0, 0, 12, 0, 3, 0, 12, 0, 0, 0, 7, 0, 12, 0, 3, 0],
            filter: [0, 0, 40, 0, 60, 0, 40, 0, 0, 0, 60, 0, 40, 0, 60, 0],
            kick:   [true, false, false, false, false, false, true, false, true, false, false, false, false, false, false, false],
            snare:  [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, false],
            hat:    [0, 40, 40, 40, 0, 40, 0, 40, 0, 40, 40, 40, 0, 40, 40, 40]
        };

        // Initialize Sequencer Grid
        const gridContainer = document.getElementById('sequencerGrid');
        const stepElements = [];

        for (let i = 0; i < NUM_STEPS; i++) {
            const col = document.createElement('div');
            col.className = 'step-col flex-1';
            let stepNum = (i + 1).toString().padStart(2, '0');
            col.innerHTML = `
                <div class="flex flex-col items-center gap-1 mb-2"><div class="led"></div><span class="text-[10px] txt-dim font-bold">STEP ${stepNum}</span></div>
                <div class="flex flex-col items-center gap-1 w-full border-b border-[#003300] pb-2" title="Melody Note Offset"><span class="text-[9px] txt-dim">PITCH</span><input type="number" class="pitch-input" data-step="${i}" data-param="pitch" value="${sequence.pitch[i]}"></div>
                <div class="flex flex-col items-center gap-1 w-full border-b border-[#003300] pb-2 pt-1" title="How bright this specific note sounds"><span class="text-[9px] txt-dim">TONE</span><input type="range" class="vertical" orient="vertical" data-step="${i}" data-param="filter" min="0" max="100" value="${sequence.filter[i]}"></div>
                <div class="flex flex-col items-center gap-2 w-full pt-1"><span class="text-[9px] txt-dim mb-1">DRUMS</span>
                    <label class="w-full relative" title="Toggle Kick Drum"><input type="checkbox" data-step="${i}" data-param="kick" ${sequence.kick[i] ? 'checked' : ''}><div class="drum-pad kick flex items-center justify-center text-[10px]">KICK</div></label>
                    <label class="w-full relative" title="Toggle Snare Drum"><input type="checkbox" data-step="${i}" data-param="snare" ${sequence.snare[i] ? 'checked' : ''}><div class="drum-pad snare flex items-center justify-center text-[10px]">SNARE</div></label>
                    <div class="w-full mt-1 flex flex-col items-center" title="Hi-Hat Volume"><span class="text-[8px] txt-dim mb-1">HAT VOL</span><input type="range" class="vertical" orient="vertical" data-step="${i}" data-param="hat" min="0" max="100" value="${sequence.hat[i]}"></div>
                </div>`;
            gridContainer.appendChild(col);
            stepElements.push(col);
        }

        gridContainer.addEventListener('input', (e) => {
            if(!e.target.dataset.param) return;
            const step = parseInt(e.target.dataset.step), param = e.target.dataset.param;
            sequence[param][step] = e.target.type === 'checkbox' ? e.target.checked : parseFloat(e.target.value) || 0;
        });

        // Initialize Keyboard UI
        const keyboardContainer = document.getElementById('keyboard');
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        
        notes.forEach((note, index) => {
            const btn = document.createElement('button');
            // Style differently if it's the active starting note (C)
            const activeStyle = index === 0 ? 'bg-[#00ff41] text-black' : 'bg-black text-[#00ff41] hover:bg-[#003300]';
            btn.className = `flex-1 text-[9px] font-bold border border-[#00ff41] transition-colors ${activeStyle}`;
            btn.innerText = note;
            btn.dataset.offset = index;
            
            btn.addEventListener('click', (e) => {
                rootNoteOffset = parseInt(e.target.dataset.offset);
                // Reset all keys to inactive style
                Array.from(keyboardContainer.children).forEach(child => {
                    child.classList.remove('bg-[#00ff41]', 'text-black');
                    child.classList.add('bg-black', 'text-[#00ff41]');
                });
                // Highlight clicked key
                e.target.classList.remove('bg-black', 'text-[#00ff41]');
                e.target.classList.add('bg-[#00ff41]', 'text-black');
            });
            keyboardContainer.appendChild(btn);
        });

        let noiseBuffer = null;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = audioCtx.sampleRate * 2;
            noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
        }

        function playVoices(step, time) {
            // Melody
            const osc = audioCtx.createOscillator(), filter = audioCtx.createBiquadFilter(), env = audioCtx.createGain();
            osc.type = 'sawtooth';
            
            // Calculate final pitch including sequence note, octave shift, and keyboard root note
            const octaveShift = parseInt(document.getElementById('octaveShift').value);
            const totalPitch = sequence.pitch[step] + (octaveShift * 12) + rootNoteOffset;
            osc.frequency.value = baseFreq * Math.pow(2, totalPitch / 12);
            
            filter.type = 'lowpass';
            const baseCutoff = parseFloat(document.getElementById('globalCutoff').value);
            filter.frequency.setValueAtTime(baseCutoff + ((sequence.filter[step] / 100) * 3000), time);
            filter.frequency.exponentialRampToValueAtTime(Math.max(50, baseCutoff), time + 0.1);
            filter.Q.value = 6;
            const decay = parseFloat(document.getElementById('globalDecay').value);
            env.gain.setValueAtTime(0, time);
            env.gain.linearRampToValueAtTime(0.6, time + 0.01);
            env.gain.exponentialRampToValueAtTime(0.01, time + decay);
            osc.connect(filter); filter.connect(env); env.connect(audioCtx.destination);
            osc.start(time); osc.stop(time + decay + 0.1);

            // Kick
            if (sequence.kick[step]) {
                const kOsc = audioCtx.createOscillator(), kEnv = audioCtx.createGain();
                kOsc.frequency.setValueAtTime(parseFloat(document.getElementById('kickPitch').value), time);
                kOsc.frequency.exponentialRampToValueAtTime(40, time + 0.1);
                kEnv.gain.setValueAtTime(0, time);
                kEnv.gain.linearRampToValueAtTime(0.8, time + 0.005);
                kEnv.gain.exponentialRampToValueAtTime(0.01, time + 0.25);
                kOsc.connect(kEnv); kEnv.connect(audioCtx.destination);
                kOsc.start(time); kOsc.stop(time + 0.3);
            }

            const nDecay = parseFloat(document.getElementById('noiseDecay').value);

            // Snare
            if (sequence.snare[step]) {
                const nSrc = audioCtx.createBufferSource(), nFilt = audioCtx.createBiquadFilter(), nEnv = audioCtx.createGain();
                nSrc.buffer = noiseBuffer; nFilt.type = 'bandpass'; nFilt.frequency.value = 2500;
                nEnv.gain.setValueAtTime(0, time); nEnv.gain.linearRampToValueAtTime(0.7, time + 0.005); nEnv.gain.exponentialRampToValueAtTime(0.01, time + (nDecay * 2));
                nSrc.connect(nFilt); nFilt.connect(nEnv); nEnv.connect(audioCtx.destination);
                nSrc.start(time); nSrc.stop(time + (nDecay * 2) + 0.1);
            }

            // Hats
            if (sequence.hat[step] > 0) {
                const hSrc = audioCtx.createBufferSource(), hFilt = audioCtx.createBiquadFilter(), hEnv = audioCtx.createGain();
                hSrc.buffer = noiseBuffer; hFilt.type = 'highpass'; hFilt.frequency.value = 7000;
                hEnv.gain.setValueAtTime(0, time); hEnv.gain.linearRampToValueAtTime((sequence.hat[step] / 100) * 0.4, time + 0.005); hEnv.gain.exponentialRampToValueAtTime(0.01, time + nDecay);
                hSrc.connect(hFilt); hFilt.connect(hEnv); hEnv.connect(audioCtx.destination);
                hSrc.start(time); hSrc.stop(time + nDecay + 0.1);
            }
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                playVoices(currentStep, nextNoteTime);
                nextNoteTime += 0.25 * (60.0 / parseInt(document.getElementById('tempoSlider').value));
                requestAnimationFrame(() => { 
                    stepElements.forEach(el => el.classList.remove('active')); 
                    stepElements[currentStep === 0 ? 15 : currentStep - 1].classList.add('active'); 
                });
                currentStep = (currentStep + 1) % NUM_STEPS;
            }
            timerID = window.setTimeout(scheduler, lookahead);
        }

        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            initAudio();
            if (isPlaying) {
                window.clearTimeout(timerID); isPlaying = false; 
                playBtn.innerText = '[ PLAY ]';
                playBtn.classList.remove('bg-[#00ff41]', 'text-black');
                stepElements.forEach(el => el.classList.remove('active'));
            } else {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                isPlaying = true; currentStep = 0; nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler(); 
                playBtn.innerText = '[ STOP ]';
                playBtn.classList.add('bg-[#00ff41]', 'text-black');
            }
        });

        // UI Event Listeners
        document.getElementById('tempoSlider').addEventListener('input', (e) => document.getElementById('tempoDisplay').innerText = e.target.value);
        document.getElementById('octaveShift').addEventListener('input', (e) => {
            let val = parseInt(e.target.value);
            document.getElementById('octaveDisplay').innerText = val > 0 ? '+' + val : val;
        });
    </script>
</body>
</html>
