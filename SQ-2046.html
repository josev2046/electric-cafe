<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQ-2046 Analog Sequencer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@500;700;900&display=swap');

        body { 
            background-color: #1e1e1e; 
            color: #e5e3d8; 
            font-family: 'Inter', sans-serif; 
            text-transform: uppercase;
            padding: 1rem;
        }

        /* Hide scrollbars for slick mobile UI but allow scrolling */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .synth-wrapper {
            box-shadow: 0 30px 60px -10px rgba(0,0,0,0.9), 0 15px 20px -5px rgba(0,0,0,0.8);
            border-radius: 10px;
        }

        .wood-cheek {
            width: 30px;
            background: linear-gradient(90deg, #2b1104 0%, #4a210d 15%, #5e2c13 40%, #4a210d 65%, #6e3518 85%, #2b1104 100%);
            position: relative;
            z-index: 20;
            border-top: 1px solid #824322;
            border-bottom: 2px solid #1a0801;
        }
        @media (min-width: 768px) { .wood-cheek { width: 44px; } }
        
        .wood-left { border-radius: 10px 0 0 10px; border-right: 4px solid #080808; }
        .wood-right { border-radius: 0 10px 10px 0; border-left: 4px solid #080808; }

        .chassis {
            background: #111; 
            border-top: 8px solid #080808; border-bottom: 8px solid #080808;
            padding: 16px; position: relative;
        }
        
        .logo-badge {
            width: 120px; background: linear-gradient(135deg, #e5e3d8 0%, #c4c2b7 100%);
            border-top: 2px solid #fff; border-left: 2px solid #fff;
            border-bottom: 2px solid #888; border-right: 2px solid #888;
            border-radius: 4px; padding: 8px; box-shadow: 0 6px 15px rgba(0,0,0,0.8);
            position: relative; display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px; 
        }
        
        .logo-badge img { width: 100%; height: auto; mix-blend-mode: multiply; filter: grayscale(1) contrast(1.5); opacity: 0.9; }

        .korg-panel { 
            border: 2px solid #e5e3d8; border-radius: 2px;
            margin-bottom: 2rem; position: relative;
            padding: 16px 8px 12px 8px; background: #151515;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); z-index: 20;
        }
        
        .korg-header {
            background: #e5e3d8; color: #111; font-weight: 900;
            padding: 2px 12px; position: absolute; top: -12px; left: 16px;
            font-size: 11px; letter-spacing: 1.5px; border-radius: 2px;
        }

        .step-col { 
            display: flex; flex-direction: column; gap: 0.5rem; 
            border-right: 1px solid #2a2a2a; padding: 0.5rem; 
            align-items: center; min-width: 60px; flex: 1;
        }
        .step-col.active { background: #1e1e1e; }
        
        .led { 
            width: 12px; height: 12px; border-radius: 50%; background: #3a0505; 
            border: 2px solid #000; margin-bottom: 4px;
        }
        .step-col.active .led { background: #ff2a2a; box-shadow: 0 0 10px #ff2a2a; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #000; border: 1px solid #222; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { height: 22px; width: 14px; background: #1a1a1a; -webkit-appearance: none; margin-top: -9px; border-radius: 2px; border: 1px solid #000; border-top: 3px solid #e5e3d8; }
        
        #pitchWheel::-webkit-slider-thumb { width: 24px; height: 36px; margin-top: -16px; border-bottom: 4px solid #000; border-top: 4px solid #000; }
        input[type=range].vertical { width: 24px; height: 80px; writing-mode: bt-lr; -webkit-appearance: slider-vertical; }
        
        input[type="checkbox"] { display: none; }
        .drum-pad { 
            width: 100%; height: 28px; background: #222; border: 2px solid #111; border-bottom-width: 4px; border-radius: 3px;
            display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #666;
        }
        input[type="checkbox"]:checked + .drum-pad { background: #ff2a2a; color: #fff; border-bottom-width: 2px; border-top-width: 4px; border-color: #8a130e; }
        
        .pitch-input { width: 44px; background: #080808; color: #ff2a2a; border: 2px inset #222; text-align: center; font-weight: bold; font-size: 0.8rem; padding: 4px 0; border-radius: 2px; font-family: monospace; }
        
        .wave-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 28px; background: #1a1a1a; color: #e5e3d8; border: 2px solid #111; border-bottom-width: 4px; border-radius: 3px; }
        .wave-btn.active { background: #e5e3d8; color: #111; border-bottom-width: 2px; border-top-width: 4px; border-color: #999; }

        .action-btn { background: #e5e3d8; color: #111; font-weight: 900; border: 2px solid #fff; border-bottom: 4px solid #aaa; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        .action-btn:active, .action-btn.active-press { border-bottom: 2px solid #aaa; border-top: 4px solid #fff; transform: translateY(2px); }

        .btn-red { background: #e0261c; color: #fff; border-color: #ff5555; border-bottom-color: #8a130e; border-right-color: #8a130e; }
        .btn-red:active, .btn-red.active-press { border-bottom-color: #ff5555; border-top-color: #8a130e; background: #c01b13; }

        .btn-small { background: #2a2a2a; color: #e5e3d8; font-weight: 900; border: 2px solid #111; border-bottom: 3px solid #000; border-radius: 3px; font-size: 9px; padding: 4px 8px; display: flex; align-items: center; justify-content: center; }
        
        select { -webkit-appearance: none; appearance: none; background: #080808; color: #e5e3d8; border: 2px inset #222; padding: 4px 8px; border-radius: 2px; font-weight: bold; }
        
        .module-group { border: 1px solid #333; padding: 12px 10px; border-radius: 2px; position: relative; background: #181818; }
        .module-group-title { position: absolute; top: -8px; left: 8px; background: #111; padding: 0 6px; font-size: 9px; font-weight: 700; color: #888; letter-spacing: 1px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start">

    <div class="w-full max-w-[84rem] flex synth-wrapper">
        <div class="wood-cheek wood-left"></div>

        <div class="flex-1 flex flex-col gap-4 chassis">
            
            <!-- MASTER SECTION -->
            <div class="flex flex-wrap justify-between items-end mb-4 px-2 pb-6 border-b-2 border-[#151515] gap-y-6 relative z-20">
                <div class="flex flex-col items-start flex-shrink-0 w-full md:w-auto">
                    <div class="logo-badge">
                        <img src="image.png" alt="Creature Logo">
                    </div>
                    <h1 class="text-4xl md:text-5xl font-black tracking-tighter" style="font-family: 'Archivo Black', sans-serif;">
                        <span class="text-[#ff2a2a]">SQ</span>-2046
                    </h1>
                    <p class="text-[9px] md:text-[11px] font-bold tracking-[0.25em] mt-1 text-[#888]">PROGRAMMABLE ANALOG SEQUENCER</p>
                </div>
                
                <div class="flex flex-wrap items-stretch justify-start md:justify-end gap-3 flex-1 mt-4">
                    <div class="module-group flex flex-col justify-center gap-2 flex-grow md:flex-grow-0">
                        <span class="module-group-title">MASTER ROUTING</span>
                        <div class="flex flex-wrap items-center gap-3 mt-2">
                            <select id="masterPlayMode" class="text-[10px] h-8">
                                <option value="forward">SEQ: FORWARD</option>
                                <option value="reverse">SEQ: REVERSE</option>
                                <option value="pingpong">SEQ: PING-PONG</option>
                                <option value="random">SEQ: RANDOM</option>
                            </select>
                            <div id="keyboard" class="flex w-full md:w-48 h-8 gap-1"></div>
                        </div>
                    </div>

                    <div class="module-group flex items-center justify-center gap-3">
                        <span class="module-group-title">CLOCK & BEND</span>
                        <div class="flex flex-col items-center w-12 mt-2">
                            <input type="range" id="pitchWheel" min="-2" max="2" value="0" step="0.01">
                            <span class="text-[8px] mt-3 font-bold text-[#888]">BEND</span>
                        </div>
                        <div class="flex flex-col items-center w-20 mt-2">
                            <input type="range" id="tempoSlider" min="80" max="180" value="120">
                            <span class="text-[8px] mt-3 font-bold text-[#888]">BPM: <span id="tempoDisplay" class="text-white">120</span></span>
                        </div>
                    </div>

                    <div class="module-group flex items-center justify-center gap-3">
                        <span class="module-group-title">DELAY FX</span>
                        <div class="flex flex-col items-center w-14 mt-2">
                            <select id="delayTime" class="text-[9px] h-6 py-0 px-1 w-full bg-[#080808] text-[#888] border border-[#222]">
                                <option value="1">1/4</option><option value="0.5">1/8</option>
                                <option value="0.75" selected>1/8D</option><option value="0.25">1/16</option>
                            </select>
                            <span class="text-[8px] mt-2 font-bold text-[#888]">TIME</span>
                        </div>
                        <div class="flex flex-col items-center w-10 mt-2">
                            <input type="range" id="delayFeedback" min="0" max="0.9" value="0.4" step="0.01">
                            <span class="text-[8px] mt-3 font-bold text-[#888]">F.BACK</span>
                        </div>
                        <div class="flex flex-col items-center w-10 mt-2">
                            <input type="range" id="delayMix" min="0" max="1" value="0.3" step="0.01">
                            <span class="text-[8px] mt-3 font-bold text-[#888]">MIX</span>
                        </div>
                    </div>

                    <div class="module-group flex items-center justify-center gap-2 bg-[#131313]">
                        <span class="module-group-title">TRANSPORT</span>
                        <button id="syncBtn" class="action-btn text-[10px] h-10 px-3">SYNC</button>
                        <button id="playBtn" class="action-btn btn-red text-sm h-10 px-4 w-28 tracking-wider">PLAY/STOP</button>
                    </div>
                </div>
            </div>

            <!-- TRACK A -->
            <div class="korg-panel">
                <div class="korg-header">VCO 1 / VCF 1</div>
                <div class="flex flex-col gap-3 px-1 pb-4 border-b border-[#2a2a2a] mb-4">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <button class="btn-small mute-btn h-6" data-track="A">MUTE</button>
                            <button class="btn-small rand-btn h-6" data-track="A">RAND</button>
                            <select class="track-mode-select text-[9px] h-6 py-0 px-1 w-20" data-track="A">
                                <option value="forward">FWD</option><option value="reverse">REV</option><option value="pingpong">PING</option><option value="random">RAND</option>
                            </select>
                        </div>
                        <div class="font-black text-lg tracking-widest text-[#dca824]">TRACK A</div>
                    </div>
                    
                    <div class="flex flex-wrap lg:flex-nowrap justify-between items-center gap-4 mt-2">
                        <div class="flex gap-1" id="waveGroupA">
                            <button class="wave-btn active" data-track="A" data-wave="sawtooth"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M2 10 L10 2 L10 10 Z"/></svg></button>
                            <button class="wave-btn" data-track="A" data-wave="square"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 10 L1 3 L6 3 L6 10 L11 10"/></svg></button>
                            <button class="wave-btn" data-track="A" data-wave="triangle"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 10 L6 2 L11 10"/></svg></button>
                            <button class="wave-btn" data-track="A" data-wave="sine"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 6 Q 3.5 1 6 6 T 11 6"/></svg></button>
                        </div>
                        <div class="flex gap-3 overflow-x-auto hide-scroll pb-1 w-full lg:w-auto flex-1">
                            <div class="flex flex-col items-center w-12 flex-shrink-0"><input type="range" id="noiseA" min="0" max="1" value="0" step="0.01"><span class="text-[9px] mt-2 font-bold text-[#888]">NOISE</span></div>
                            <div class="flex flex-col items-center w-12 flex-shrink-0"><input type="range" id="cutoffA" min="50" max="2500" value="200"><span class="text-[9px] mt-2 font-bold text-[#888]">CUTOFF</span></div>
                            <div class="flex flex-col items-center w-12 flex-shrink-0"><input type="range" id="decayA" min="0.05" max="0.5" value="0.15" step="0.01"><span class="text-[9px] mt-2 font-bold text-[#888]">DECAY</span></div>
                            <div class="flex flex-col items-center w-12 flex-shrink-0"><input type="range" id="accentA" min="0" max="1" value="0.6" step="0.01"><span class="text-[9px] mt-2 font-bold text-[#888]">ACCENT</span></div>
                            <div class="flex flex-col items-center w-12 flex-shrink-0"><input type="range" id="glideA" min="0" max="0.2" value="0.05" step="0.001"><span class="text-[9px] mt-2 font-bold text-[#888]">GLIDE</span></div>
                            <div class="flex flex-col items-center w-12 flex-shrink-0"><input type="range" id="octaveA" min="-2" max="2" value="0"><span class="text-[9px] mt-2 font-bold text-[#888]">OCTAVE</span></div>
                        </div>
                    </div>
                </div>
                <div class="flex overflow-x-auto w-full hide-scroll" id="gridA"></div>
            </div>

            <!-- TRACK B -->
            <div class="korg-panel">
                <div class="korg-header">VCO 2 / VCF 2</div>
                <div class="flex flex-col gap-3 px-1 pb-4 border-b border-[#2a2a2a] mb-4">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <button class="btn-small mute-btn h-6" data-track="B">MUTE</button>
                            <button class="btn-small rand-btn h-6" data-track="B">RAND</button>
                            <select class="track-mode-select text-[9px] h-6 py-0 px-1 w-20" data-track="B">
                                <option value="forward">FWD</option><option value="reverse">REV</option><option value="pingpong">PING</option><option value="random">RAND</option>
                            </select>
                        </div>
                        <div class="font-black text-lg tracking-widest text-[#dca824]">TRACK B</div>
                    </div>
                    
                    <div class="flex flex-wrap lg:flex-nowrap justify-between items-center gap-4 mt-2">
                        <div class="flex gap-1" id="waveGroupB">
                            <button class="wave-btn" data-track="B" data-wave="sawtooth"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M2 10 L10 2 L10 10 Z"/></svg></button>
                            <button class="wave-btn active" data-track="B" data-wave="square"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 10 L1 3 L6 3 L6 10 L11 10"/></svg></button>
                            <button class="wave-btn" data-track="B" data-wave="triangle"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 10 L6 2 L11 10"/></svg></button>
                            <button class="wave-btn" data-track="B" data-wave="sine"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 6 Q 3.5 1 6 6 T 11 6"/></svg></button>
                        </div>
                        <div class="flex gap-3 overflow-x-auto hide-scroll pb-1 w-full lg:w-auto flex-1">
                            <div class="flex flex-col items-center w-12 flex-shrink-0"><input type="range" id="noiseB" min="0" max="1" value="0" step="0.01"><span class="text-[9px] mt-2 font-bold text-[#888]">NOISE</span></div>
                            <div class="flex flex-col items-center w-12 flex-shrink-0"><input type="range" id="cutoffB" min="50" max="2500" value="100"><span class="text-[9px] mt-2 font-bold text-[#888]">CUTOFF</span></div>
                            <div class="flex flex-col items-center w-12 flex-shrink-0"><input type="range" id="decayB" min="0.05" max="0.5" value="0.2" step="0.01"><span class="text-[9px] mt-2 font-bold text-[#888]">DECAY</span></div>
                            <div class="flex flex-col items-center w-12 flex-shrink-0"><input type="range" id="accentB" min="0" max="1" value="0.6" step="0.01"><span class="text-[9px] mt-2 font-bold text-[#888]">ACCENT</span></div>
                            <div class="flex flex-col items-center w-12 flex-shrink-0"><input type="range" id="glideB" min="0" max="0.2" value="0.05" step="0.001"><span class="text-[9px] mt-2 font-bold text-[#888]">GLIDE</span></div>
                            <div class="flex flex-col items-center w-12 flex-shrink-0"><input type="range" id="octaveB" min="-2" max="2" value="-1"><span class="text-[9px] mt-2 font-bold text-[#888]">OCTAVE</span></div>
                        </div>
                    </div>
                </div>
                <div class="flex overflow-x-auto w-full hide-scroll" id="gridB"></div>
            </div>

            <!-- DRUMS -->
            <div class="korg-panel">
                <div class="korg-header">RHYTHM GENERATOR</div>
                <div class="flex justify-between items-center px-1 pb-4 border-b border-[#2a2a2a] mb-4">
                    <div class="flex items-center gap-2">
                        <button class="btn-small mute-btn h-6" data-track="Drums">MUTE</button>
                        <button class="btn-small rand-btn h-6" data-track="Drums">RAND</button>
                        <select class="track-mode-select text-[9px] h-6 py-0 px-1 w-20" data-track="Drums">
                            <option value="forward">FWD</option><option value="reverse">REV</option><option value="pingpong">PING</option><option value="random">RAND</option>
                        </select>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex flex-col items-center w-16">
                            <input type="range" id="drumNoiseDecay" min="0.01" max="0.25" value="0.05" step="0.01">
                            <span class="text-[9px] mt-2 font-bold text-[#888]">N. DECAY</span>
                        </div>
                        <div class="flex flex-col items-center w-16">
                            <input type="range" id="kickPitch" min="100" max="250" value="150">
                            <span class="text-[9px] mt-2 font-bold text-[#888]">K. TUNE</span>
                        </div>
                    </div>
                </div>
                <div class="flex overflow-x-auto w-full hide-scroll" id="gridDrums"></div>
            </div>
        </div>
        
        <div class="wood-cheek wood-right"></div>
    </div>

    <script>
        let audioCtx = null, isPlaying = false, nextNoteTime = 0, timerID, audioInitialized = false;
        const lookahead = 25.0, scheduleAheadTime = 0.1, baseFreq = 65.41, NUM_STEPS = 16;
        let rootNoteOffset = 0, globalPitchBend = 0;

        let masterBus, delayNode, delayFeedback, delayMix, delayFilter, noiseBuffer;
        let synthEngines = { A: null, B: null };

        const tracks = {
            A: { muted: false, wave: 'sawtooth', step: 0, dir: 1, mode: 'forward', prevSlide: false, pitch: [12, 0, 12, 0, 15, 0, 12, 0, 19, 0, 15, 0, 12, 0, 15, 0], filter: [80, 0, 40, 0, 80, 0, 40, 0, 100, 0, 80, 0, 40, 0, 80, 0], slide: [false, true, false, false, false, true, false, false, false, false, true, false, false, false, true, false], accent: [true, false, false, false, true, false, false, false, true, false, false, false, true, false, false, false], elements: [] },
            B: { muted: false, wave: 'square', step: 0, dir: 1, mode: 'forward', prevSlide: false, pitch: [0, 0, 0, 0, 3, 3, 3, 3, 7, 7, 7, 7, 5, 5, 5, 5], filter: [40, 40, 60, 40, 40, 40, 60, 40, 50, 50, 80, 50, 40, 40, 60, 40], slide: [false, false, false, true, false, false, false, true, false, false, false, true, false, false, false, false], accent: [false, false, true, false, false, false, true, false, false, false, true, false, false, false, true, false], elements: [] },
            Drums: { muted: false, step: 0, dir: 1, mode: 'forward', kick: [true, false, false, false, true, false, false, false, true, false, false, false, true, false, false, false], snare: [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, false], hat: [0, 60, 40, 60, 0, 60, 40, 60, 0, 60, 40, 60, 0, 60, 40, 60], elements: [] }
        };

        function renderSynthGrid(containerId, trackData, trackId) {
            const container = document.getElementById(containerId);
            for (let i = 0; i < NUM_STEPS; i++) {
                const col = document.createElement('div');
                col.className = 'step-col';
                col.innerHTML = `
                    <div class="led"></div>
                    <span class="text-[9px] font-bold text-[#666] mt-[-2px] mb-2">${(i+1).toString().padStart(2, '0')}</span>
                    <input type="number" class="pitch-input" data-track="${trackId}" data-step="${i}" data-param="pitch" value="${trackData.pitch[i]}">
                    
                    <div class="flex gap-1 mt-1 w-full justify-center">
                        <label class="cursor-pointer text-[8px] font-bold" title="SLIDE">
                            <input type="checkbox" class="peer sr-only" data-track="${trackId}" data-step="${i}" data-param="slide" ${trackData.slide[i] ? 'checked' : ''}>
                            <div class="px-1 bg-[#222] border border-[#111] text-[#555] peer-checked:bg-[#dca824] peer-checked:text-[#111] rounded-sm transition-colors">S</div>
                        </label>
                        <label class="cursor-pointer text-[8px] font-bold" title="ACCENT">
                            <input type="checkbox" class="peer sr-only" data-track="${trackId}" data-step="${i}" data-param="accent" ${trackData.accent[i] ? 'checked' : ''}>
                            <div class="px-1 bg-[#222] border border-[#111] text-[#555] peer-checked:bg-[#fff] peer-checked:text-[#111] rounded-sm transition-colors">A</div>
                        </label>
                    </div>

                    <div class="mt-3 w-full flex justify-center h-[55px]">
                        <input type="range" class="vertical" orient="vertical" data-track="${trackId}" data-step="${i}" data-param="filter" min="0" max="100" value="${trackData.filter[i]}">
                    </div>
                `;
                container.appendChild(col);
                trackData.elements.push(col);
            }
        }

        function renderDrumGrid(containerId, trackData, trackId) {
            const container = document.getElementById(containerId);
            for (let i = 0; i < NUM_STEPS; i++) {
                const col = document.createElement('div');
                col.className = 'step-col';
                col.innerHTML = `
                    <div class="led"></div>
                    <span class="text-[9px] font-bold text-[#666] mt-[-2px] mb-2">${(i+1).toString().padStart(2, '0')}</span>
                    <label class="w-full relative mb-1"><input type="checkbox" data-track="${trackId}" data-step="${i}" data-param="kick" ${trackData.kick[i] ? 'checked' : ''}><div class="drum-pad">BD</div></label>
                    <label class="w-full relative mb-3"><input type="checkbox" data-track="${trackId}" data-step="${i}" data-param="snare" ${trackData.snare[i] ? 'checked' : ''}><div class="drum-pad">SD</div></label>
                    <div class="mt-1 w-full flex justify-center h-[55px]">
                        <input type="range" class="vertical" orient="vertical" data-track="${trackId}" data-step="${i}" data-param="hat" min="0" max="100" value="${trackData.hat[i]}">
                    </div>
                `;
                container.appendChild(col);
                trackData.elements.push(col);
            }
        }

        renderSynthGrid('gridA', tracks.A, 'A');
        renderSynthGrid('gridB', tracks.B, 'B');
        renderDrumGrid('gridDrums', tracks.Drums, 'Drums');

        document.querySelectorAll('.mute-btn').forEach(btn => btn.addEventListener('click', (e) => {
            const t = e.target.dataset.track; tracks[t].muted = !tracks[t].muted;
            e.target.style.background = tracks[t].muted ? '#e0261c' : ''; e.target.style.color = tracks[t].muted ? '#fff' : ''; e.target.style.borderColor = tracks[t].muted ? '#8a130e' : '';
        }));

        document.querySelectorAll('.rand-btn').forEach(btn => btn.addEventListener('click', (e) => {
            const t = tracks[e.target.dataset.track];
            for (let i = 0; i < NUM_STEPS; i++) {
                if (e.target.dataset.track !== 'Drums') {
                    t.pitch[i] = Math.random() > 0.4 ? Math.floor(Math.random() * 24) : 0;
                    t.filter[i] = Math.floor(Math.random() * 100);
                    t.slide[i] = Math.random() > 0.8; t.accent[i] = Math.random() > 0.7;
                    t.elements[i].querySelector('[data-param="pitch"]').value = t.pitch[i];
                    t.elements[i].querySelector('[data-param="filter"]').value = t.filter[i];
                    t.elements[i].querySelector('[data-param="slide"]').checked = t.slide[i];
                    t.elements[i].querySelector('[data-param="accent"]').checked = t.accent[i];
                } else {
                    t.kick[i] = Math.random() > 0.7; t.snare[i] = Math.random() > 0.85; t.hat[i] = Math.random() > 0.3 ? Math.floor(Math.random() * 100) : 0;
                    t.elements[i].querySelector('[data-param="kick"]').checked = t.kick[i];
                    t.elements[i].querySelector('[data-param="snare"]').checked = t.snare[i];
                    t.elements[i].querySelector('[data-param="hat"]').value = t.hat[i];
                }
            }
        }));

        document.querySelectorAll('.track-mode-select').forEach(sel => sel.addEventListener('change', (e) => tracks[e.target.dataset.track].mode = e.target.value));
        document.getElementById('masterPlayMode').addEventListener('change', (e) => ['A', 'B', 'Drums'].forEach(id => { tracks[id].mode = e.target.value; document.querySelector(`.track-mode-select[data-track="${id}"]`).value = e.target.value; }));
        
        document.getElementById('syncBtn').addEventListener('click', (e) => {
            e.target.classList.add('active-press'); setTimeout(() => e.target.classList.remove('active-press'), 100);
            ['A', 'B', 'Drums'].forEach(id => { tracks[id].step = tracks[id].mode === 'reverse' ? NUM_STEPS - 1 : 0; tracks[id].dir = 1; });
        });

        const pitchWheel = document.getElementById('pitchWheel');
        pitchWheel.addEventListener('input', (e) => globalPitchBend = parseFloat(e.target.value));
        const snapPitch = () => { pitchWheel.value = 0; globalPitchBend = 0; };
        pitchWheel.addEventListener('mouseup', snapPitch); pitchWheel.addEventListener('touchend', snapPitch); pitchWheel.addEventListener('mouseleave', (e) => { if(e.buttons>0) snapPitch(); });

        document.querySelectorAll('.wave-btn').forEach(btn => btn.addEventListener('click', (e) => {
            tracks[e.currentTarget.dataset.track].wave = e.currentTarget.dataset.wave;
            document.querySelectorAll(`#waveGroup${e.currentTarget.dataset.track} .wave-btn`).forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
        }));

        document.body.addEventListener('input', (e) => {
            if(!e.target.dataset.track || e.target.id === 'pitchWheel' || e.target.classList.contains('track-mode-select')) return;
            tracks[e.target.dataset.track][e.target.dataset.param][e.target.dataset.step] = e.target.type === 'checkbox' ? e.target.checked : parseFloat(e.target.value) || 0;
        });

        const keyboard = document.getElementById('keyboard');
        const notes = [{n:'C',c:'w'},{n:'C#',c:'b'},{n:'D',c:'w'},{n:'D#',c:'b'},{n:'E',c:'w'},{n:'F',c:'w'},{n:'F#',c:'b'},{n:'G',c:'w'},{n:'G#',c:'b'},{n:'A',c:'w'},{n:'A#',c:'b'},{n:'B',c:'w'}];
        notes.forEach((note, i) => {
            const btn = document.createElement('button');
            btn.className = `flex-1 text-[7px] font-bold border border-[#111] transition-all rounded-sm shadow-sm ${note.c === 'w' ? 'bg-[#e5e3d8] text-[#111]' : 'bg-[#222] text-[#e5e3d8]'}`;
            if(i === 0) { btn.style.background = '#dca824'; btn.style.color = '#111'; btn.style.borderColor = '#9e7816'; }
            btn.innerText = note.n; btn.dataset.offset = i;
            btn.addEventListener('click', (e) => {
                rootNoteOffset = parseInt(e.target.dataset.offset);
                Array.from(keyboard.children).forEach((c, j) => { c.style.background = notes[j].c === 'w' ? '#e5e3d8' : '#222'; c.style.color = notes[j].c === 'w' ? '#111' : '#e5e3d8'; c.style.borderColor = '#111'; });
                e.target.style.background = '#dca824'; e.target.style.color = '#111'; e.target.style.borderColor = '#9e7816';
            });
            keyboard.appendChild(btn);
        });

        function updateDelayParams() {
            if (!audioCtx || !delayNode) return;
            const timeSecs = (60.0 / parseFloat(document.getElementById('tempoSlider').value)) * parseFloat(document.getElementById('delayTime').value);
            delayNode.delayTime.setTargetAtTime(timeSecs, audioCtx.currentTime, 0.1);
            delayFeedback.gain.setTargetAtTime(parseFloat(document.getElementById('delayFeedback').value), audioCtx.currentTime, 0.1);
            delayMix.gain.setTargetAtTime(parseFloat(document.getElementById('delayMix').value), audioCtx.currentTime, 0.1);
        }

        ['delayTime', 'delayFeedback', 'delayMix'].forEach(id => document.getElementById(id).addEventListener('input', updateDelayParams));
        document.getElementById('tempoSlider').addEventListener('input', (e) => { document.getElementById('tempoDisplay').innerText = e.target.value; updateDelayParams(); });

        async function initAudio() {
            if (audioInitialized) return;
            
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            // Silent iOS unlock ping
            const unlockOsc = audioCtx.createOscillator(); unlockOsc.connect(audioCtx.destination);
            unlockOsc.start(audioCtx.currentTime); unlockOsc.stop(audioCtx.currentTime + 0.1);

            masterBus = audioCtx.createGain(); masterBus.connect(audioCtx.destination);
            delayNode = audioCtx.createDelay(2.0); delayFeedback = audioCtx.createGain(); delayMix = audioCtx.createGain(); delayFilter = audioCtx.createBiquadFilter();
            delayFilter.type = 'lowpass'; delayFilter.frequency.value = 2000;
            
            masterBus.connect(delayNode); delayNode.connect(delayFilter); delayFilter.connect(delayFeedback); delayFeedback.connect(delayNode);
            delayNode.connect(delayMix); delayMix.connect(audioCtx.destination);
            updateDelayParams();

            const bufSize = audioCtx.sampleRate * 2; noiseBuffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const out = noiseBuffer.getChannelData(0); for (let i = 0; i < bufSize; i++) out[i] = Math.random() * 2 - 1;

            ['A', 'B'].forEach(id => {
                const env = audioCtx.createGain(); env.gain.value = 0;
                const filter = audioCtx.createBiquadFilter();
                const osc = audioCtx.createOscillator();
                const noiseSrc = audioCtx.createBufferSource(); noiseSrc.buffer = noiseBuffer; noiseSrc.loop = true;
                const noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0;
                
                osc.connect(filter); noiseSrc.connect(noiseGain); noiseGain.connect(filter);
                filter.connect(env); env.connect(masterBus); 
                osc.start(); noiseSrc.start();
                synthEngines[id] = { osc, filter, env, noiseGain };
            });
            audioInitialized = true;
        }

        function playSynthVoice(trackId, data, step, time, octId, decId, cutId, nId, accId, gliId) {
            if (data.muted) return; 
            const engine = synthEngines[trackId], baseCut = parseFloat(document.getElementById(cutId).value), accDepth = parseFloat(document.getElementById(accId).value);
            
            engine.osc.type = data.wave; engine.noiseGain.gain.setValueAtTime(parseFloat(document.getElementById(nId).value), time);
            
            if (data.filter[step] <= 0 && data.pitch[step] === 0) {
                engine.env.gain.cancelScheduledValues(time); engine.env.gain.setTargetAtTime(0, time, 0.01);
                data.prevSlide = false; return;
            }
            
            const targetFreq = baseFreq * Math.pow(2, (data.pitch[step] + (parseInt(document.getElementById(octId).value) * 12) + rootNoteOffset + globalPitchBend) / 12);
            let peak = (data.wave === 'sawtooth' || data.wave === 'square') ? 0.3 : 0.5, targetCut = baseCut + ((data.filter[step] / 100) * 4000), dec = parseFloat(document.getElementById(decId).value);
            
            if (data.accent[step]) { peak *= (1 + (accDepth * 0.5)); targetCut += (accDepth * 4000); dec *= (1 - (accDepth * 0.5)); }
            engine.filter.Q.value = data.wave === 'square' ? 3 : 8;
            
            if (data.prevSlide) {
                engine.osc.frequency.setTargetAtTime(targetFreq, time, parseFloat(document.getElementById(gliId).value));
                engine.filter.frequency.setTargetAtTime(targetCut, time, parseFloat(document.getElementById(gliId).value));
            } else {
                engine.osc.frequency.setValueAtTime(targetFreq, time);
                engine.filter.frequency.cancelScheduledValues(time); engine.filter.frequency.setValueAtTime(targetCut, time);
                engine.env.gain.cancelScheduledValues(time); engine.env.gain.setValueAtTime(0, time); engine.env.gain.linearRampToValueAtTime(peak, time + 0.01);
            }
            
            const stepDur = 0.25 * (60.0 / parseInt(document.getElementById('tempoSlider').value));
            if (data.slide[step]) {
                engine.env.gain.exponentialRampToValueAtTime(peak * 0.5, time + stepDur);
                engine.filter.frequency.exponentialRampToValueAtTime(Math.max(50, baseCut + 500), time + stepDur);
            } else {
                engine.env.gain.exponentialRampToValueAtTime(0.001, time + dec);
                engine.filter.frequency.exponentialRampToValueAtTime(Math.max(50, baseCut), time + dec);
            }
            data.prevSlide = data.slide[step];
        }

        function playDrumVoices(step, time) {
            const t = tracks.Drums; if (t.muted) return; 
            const nDec = parseFloat(document.getElementById('drumNoiseDecay').value);

            if (t.kick[step]) {
                const o = audioCtx.createOscillator(), e = audioCtx.createGain();
                o.frequency.setValueAtTime(parseFloat(document.getElementById('kickPitch').value), time); o.frequency.exponentialRampToValueAtTime(40, time + 0.1);
                e.gain.setValueAtTime(0, time); e.gain.linearRampToValueAtTime(0.8, time + 0.005); e.gain.exponentialRampToValueAtTime(0.01, time + 0.25);
                o.connect(e); e.connect(masterBus); o.start(time); o.stop(time + 0.3);
            }
            if (t.snare[step]) {
                const s = audioCtx.createBufferSource(), f = audioCtx.createBiquadFilter(), e = audioCtx.createGain();
                s.buffer = noiseBuffer; f.type = 'bandpass'; f.frequency.value = 2500;
                e.gain.setValueAtTime(0, time); e.gain.linearRampToValueAtTime(0.6, time + 0.005); e.gain.exponentialRampToValueAtTime(0.01, time + (nDec * 3)); 
                s.connect(f); f.connect(e); e.connect(masterBus); s.start(time); s.stop(time + (nDec * 3) + 0.1);
            }
            if (t.hat[step] > 0) {
                const s = audioCtx.createBufferSource(), f = audioCtx.createBiquadFilter(), e = audioCtx.createGain();
                s.buffer = noiseBuffer; f.type = 'highpass'; f.frequency.value = 7000;
                e.gain.setValueAtTime(0, time); e.gain.linearRampToValueAtTime((t.hat[step] / 100) * 0.4, time + 0.005); e.gain.exponentialRampToValueAtTime(0.01, time + nDec);
                s.connect(f); f.connect(e); e.connect(masterBus); s.start(time); s.stop(time + nDec + 0.1);
            }
        }

        function getNextStep(id) {
            const t = tracks[id];
            switch(t.mode) {
                case 'reverse': return (t.step - 1 + NUM_STEPS) % NUM_STEPS;
                case 'pingpong': if (t.dir === 1) { if (t.step >= NUM_STEPS - 1) { t.dir = -1; return t.step - 1; } return t.step + 1; } else { if (t.step <= 0) { t.dir = 1; return t.step + 1; } return t.step - 1; }
                case 'random': return Math.floor(Math.random() * NUM_STEPS);
                case 'forward': default: return (t.step + 1) % NUM_STEPS;
            }
        }

        function scheduler() {
            // Mobile Safari Catch-Up Protection (prevents crashing if tab backgrounds)
            if (nextNoteTime < audioCtx.currentTime) nextNoteTime = audioCtx.currentTime + 0.05;

            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                playSynthVoice('A', tracks.A, tracks.A.step, nextNoteTime, 'octaveA', 'decayA', 'cutoffA', 'noiseA', 'accentA', 'glideA');
                playSynthVoice('B', tracks.B, tracks.B.step, nextNoteTime, 'octaveB', 'decayB', 'cutoffB', 'noiseB', 'accentB', 'glideB');
                playDrumVoices(tracks.Drums.step, nextNoteTime);
                
                nextNoteTime += 0.25 * (60.0 / parseInt(document.getElementById('tempoSlider').value));
                
                const steps = { A: tracks.A.step, B: tracks.B.step, Drums: tracks.Drums.step };
                requestAnimationFrame(() => ['A', 'B', 'Drums'].forEach(id => {
                    tracks[id].elements.forEach(el => el.classList.remove('active'));
                    tracks[id].elements[steps[id]].classList.add('active');
                }));
                ['A', 'B', 'Drums'].forEach(id => tracks[id].step = getNextStep(id));
            }
            timerID = window.setTimeout(scheduler, lookahead);
        }

        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', async () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            await initAudio();

            if (isPlaying) {
                window.clearTimeout(timerID); isPlaying = false; playBtn.classList.remove('active-press');
                if (masterBus) masterBus.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                ['A', 'B', 'Drums'].forEach(id => tracks[id].elements.forEach(el => el.classList.remove('active')));
                ['A', 'B'].forEach(id => tracks[id].prevSlide = false);
            } else {
                if (masterBus) masterBus.gain.setTargetAtTime(1, audioCtx.currentTime, 0.01);
                isPlaying = true; 
                ['A', 'B', 'Drums'].forEach(id => { tracks[id].step = tracks[id].mode === 'reverse' ? NUM_STEPS - 1 : (tracks[id].mode === 'random' ? Math.floor(Math.random() * NUM_STEPS) : 0); tracks[id].dir = 1; });
                nextNoteTime = audioCtx.currentTime + 0.05; scheduler(); 
                playBtn.classList.add('active-press');
            }
        });
    </script>
</body>
</html>
