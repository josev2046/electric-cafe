<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Cafe Multi-Track Emulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- TERMINAL AESTHETICS --- */
        body { 
            background-color: #000000; 
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
            text-transform: uppercase;
        }
        
        .panel { 
            background: #000000; 
            border: 1px solid #00ff41; 
            border-radius: 0; 
            margin-bottom: 1rem;
        }
        
        .track-header {
            background: #001a00;
            border-bottom: 1px solid #00ff41;
            padding: 0.5rem 1rem;
            font-weight: bold;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .step-col { 
            display: flex; flex-direction: column; gap: 0.5rem; 
            background: #000000; border-right: 1px solid #003300; 
            padding: 0.5rem; align-items: center; min-width: 60px; flex: 1;
        }
        .step-col:last-child { border-right: none; }
        
        .step-col.active { background: #002200; }
        
        /* Square LEDs */
        .led { 
            width: 10px; height: 10px; background: #000000; 
            border: 1px solid #003300; margin-bottom: 4px;
        }
        .step-col.active .led { 
            background: #00ff41; box-shadow: 0 0 8px #00ff41; border-color: #00ff41;
        }
        
        /* Custom Sliders */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: #000000; border: 1px solid #00ff41;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 14px; width: 8px; background: #00ff41; cursor: pointer; -webkit-appearance: none; margin-top: -6px;
        }
        
        /* Pitch Wheel special styling */
        #pitchWheel::-webkit-slider-thumb { width: 14px; height: 20px; margin-top: -9px; border: 2px solid #000; }

        input[type=range].vertical { 
            width: 12px; height: 50px; writing-mode: bt-lr; -webkit-appearance: slider-vertical; 
        }
        
        /* Checkboxes / Drum Pads */
        input[type="checkbox"] { display: none; }
        .drum-pad { 
            width: 100%; height: 24px; background: #000000; border: 1px solid #00ff41;
            cursor: pointer; transition: 0s; color: #00ff41; font-size: 9px;
            display: flex; align-items: center; justify-content: center;
        }
        input[type="checkbox"]:checked + .drum-pad { 
            background: #00ff41; color: #000000; box-shadow: 0 0 5px #00ff41; font-weight: bold;
        }
        
        .pitch-input { 
            width: 45px; background: #000000; color: #00ff41; border: 1px dashed #00ff41; 
            text-align: center; font-weight: bold; font-size: 0.8rem; padding: 2px 0; 
        }
        .pitch-input:focus { outline: none; border: 1px solid #00ff41; background: #001a00; }

        .wave-btn {
            display: flex; align-items: center; justify-content: center;
            width: 24px; height: 24px; border: 1px solid #00ff41; background: #000000; color: #00ff41;
            cursor: pointer; transition: all 0.1s;
        }
        .wave-btn svg { stroke-width: 1.5; }
        .wave-btn.active { background: #00ff41; color: #000000; box-shadow: 0 0 5px #00ff41; }

        .mute-btn, .rand-btn { cursor: pointer; transition: all 0.1s; }

        .txt-dim { color: #008f11; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-start">

    <div class="w-full max-w-7xl flex flex-col gap-2">
        <div class="panel p-4 flex flex-wrap justify-between items-center gap-4 border-[2px]">
            <div>
                <h1 class="text-2xl font-bold tracking-widest">MS-3K MULTI-TRACK EMULATOR</h1>
                <p class="txt-dim text-xs mt-1">Master Clock & Transport Controls</p>
            </div>
            <div class="flex flex-wrap items-center gap-4">
                <div class="flex items-center gap-2 px-3 py-2 border border-[#00ff41]" title="Sets the mode for ALL tracks">
                    <label class="text-xs font-bold txt-dim">MASTER MODE</label>
                    <select id="masterPlayMode" class="bg-black text-[#00ff41] outline-none font-bold cursor-pointer uppercase text-xs">
                        <option value="forward">Forward</option>
                        <option value="reverse">Reverse</option>
                        <option value="pingpong">Ping-Pong</option>
                        <option value="random">Random</option>
                    </select>
                </div>
                <div class="mt-1 pt-2" title="Changes the master root key for all synth layers">
                    <div id="keyboard" class="flex w-48 h-8 gap-[2px]"></div>
                </div>
                <div class="flex items-center gap-3 px-4 py-2 border border-[#00ff41] bg-[#001a00]" title="Spring-loaded pitch bend (+/- 2 semitones)">
                    <label class="text-xs font-bold txt-dim">PITCH WHEEL</label>
                    <input type="range" id="pitchWheel" min="-2" max="2" value="0" step="0.01" class="w-24">
                </div>
                <div class="flex items-center gap-3 px-4 py-2 border border-[#00ff41]">
                    <label class="text-xs font-bold txt-dim">BPM</label>
                    <input type="range" id="tempoSlider" min="80" max="180" value="120" class="w-24">
                    <span id="tempoDisplay" class="font-bold w-8 text-right">120</span>
                </div>
                <button id="playBtn" class="bg-black text-[#00ff41] border border-[#00ff41] font-bold py-2 px-8 hover:bg-[#003300] transition-colors tracking-wider text-lg">
                    [ PLAY ]
                </button>
            </div>
        </div>

        <div class="panel">
            <div class="track-header">
                <div class="flex items-center gap-2">
                    <button class="mute-btn border border-[#00ff41] bg-black text-[#00ff41] px-3 py-1 text-[10px] font-bold hover:bg-[#003300]" data-track="A">[ MUTE ]</button>
                    <button class="rand-btn border border-[#00ff41] bg-black text-[#00ff41] px-3 py-1 text-[10px] font-bold hover:bg-[#003300]" data-track="A">[ RAND ]</button>
                    <select class="track-mode-select bg-black text-[#00ff41] border border-[#00ff41] px-2 py-1 text-[10px] font-bold outline-none cursor-pointer" data-track="A">
                        <option value="forward">MODE: FWD</option>
                        <option value="reverse">MODE: REV</option>
                        <option value="pingpong">MODE: PING</option>
                        <option value="random">MODE: RAND</option>
                    </select>
                    <span class="ml-2">TRACK A // SYNTH 1</span>
                    <div class="flex gap-1 ml-2" id="waveGroupA">
                        <button class="wave-btn active" data-track="A" data-wave="sawtooth" title="Sawtooth"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M2 10 L10 2 L10 10 Z"/></svg></button>
                        <button class="wave-btn" data-track="A" data-wave="square" title="Square"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 10 L1 3 L6 3 L6 10 L11 10"/></svg></button>
                        <button class="wave-btn" data-track="A" data-wave="triangle" title="Triangle"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 10 L6 2 L11 10"/></svg></button>
                        <button class="wave-btn" data-track="A" data-wave="sine" title="Sine"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 6 Q 3.5 1 6 6 T 11 6"/></svg></button>
                    </div>
                </div>
                <div class="flex flex-wrap items-center gap-6">
                    <label class="text-[10px] txt-dim flex items-center gap-2" title="White Noise Mix">NOISE <input type="range" id="noiseA" min="0" max="1" value="0" step="0.01" class="w-16"></label>
                    <label class="text-[10px] txt-dim flex items-center gap-2" title="Global brightness">BRIGHTNESS <input type="range" id="cutoffA" min="50" max="2500" value="200" class="w-16"></label>
                    <label class="text-[10px] txt-dim flex items-center gap-2" title="Length of note">LENGTH <input type="range" id="decayA" min="0.05" max="0.5" value="0.15" step="0.01" class="w-16"></label>
                    <label class="text-[10px] txt-dim flex items-center gap-2" title="Octave shift">OCTAVE <input type="range" id="octaveA" min="-2" max="2" value="0" class="w-16"></label>
                </div>
            </div>
            <div class="flex overflow-x-auto w-full" id="gridA"></div>
        </div>

        <div class="panel">
            <div class="track-header">
                <div class="flex items-center gap-2">
                    <button class="mute-btn border border-[#00ff41] bg-black text-[#00ff41] px-3 py-1 text-[10px] font-bold hover:bg-[#003300]" data-track="B">[ MUTE ]</button>
                    <button class="rand-btn border border-[#00ff41] bg-black text-[#00ff41] px-3 py-1 text-[10px] font-bold hover:bg-[#003300]" data-track="B">[ RAND ]</button>
                    <select class="track-mode-select bg-black text-[#00ff41] border border-[#00ff41] px-2 py-1 text-[10px] font-bold outline-none cursor-pointer" data-track="B">
                        <option value="forward">MODE: FWD</option>
                        <option value="reverse">MODE: REV</option>
                        <option value="pingpong">MODE: PING</option>
                        <option value="random">MODE: RAND</option>
                    </select>
                    <span class="ml-2">TRACK B // SYNTH 2</span>
                    <div class="flex gap-1 ml-2" id="waveGroupB">
                        <button class="wave-btn" data-track="B" data-wave="sawtooth" title="Sawtooth"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M2 10 L10 2 L10 10 Z"/></svg></button>
                        <button class="wave-btn active" data-track="B" data-wave="square" title="Square"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 10 L1 3 L6 3 L6 10 L11 10"/></svg></button>
                        <button class="wave-btn" data-track="B" data-wave="triangle" title="Triangle"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 10 L6 2 L11 10"/></svg></button>
                        <button class="wave-btn" data-track="B" data-wave="sine" title="Sine"><svg width="14" height="14" viewBox="0 0 12 12" stroke="currentColor" fill="none"><path d="M1 6 Q 3.5 1 6 6 T 11 6"/></svg></button>
                    </div>
                </div>
                <div class="flex flex-wrap items-center gap-6">
                    <label class="text-[10px] txt-dim flex items-center gap-2" title="White Noise Mix">NOISE <input type="range" id="noiseB" min="0" max="1" value="0" step="0.01" class="w-16"></label>
                    <label class="text-[10px] txt-dim flex items-center gap-2" title="Global brightness">BRIGHTNESS <input type="range" id="cutoffB" min="50" max="2500" value="100" class="w-16"></label>
                    <label class="text-[10px] txt-dim flex items-center gap-2" title="Length of note">LENGTH <input type="range" id="decayB" min="0.05" max="0.5" value="0.2" step="0.01" class="w-16"></label>
                    <label class="text-[10px] txt-dim flex items-center gap-2" title="Octave shift">OCTAVE <input type="range" id="octaveB" min="-2" max="2" value="-1" class="w-16"></label>
                </div>
            </div>
            <div class="flex overflow-x-auto w-full" id="gridB"></div>
        </div>

        <div class="panel">
            <div class="track-header">
                <div class="flex items-center gap-2">
                    <button class="mute-btn border border-[#00ff41] bg-black text-[#00ff41] px-3 py-1 text-[10px] font-bold hover:bg-[#003300]" data-track="Drums">[ MUTE ]</button>
                    <button class="rand-btn border border-[#00ff41] bg-black text-[#00ff41] px-3 py-1 text-[10px] font-bold hover:bg-[#003300]" data-track="Drums">[ RAND ]</button>
                    <select class="track-mode-select bg-black text-[#00ff41] border border-[#00ff41] px-2 py-1 text-[10px] font-bold outline-none cursor-pointer" data-track="Drums">
                        <option value="forward">MODE: FWD</option>
                        <option value="reverse">MODE: REV</option>
                        <option value="pingpong">MODE: PING</option>
                        <option value="random">MODE: RAND</option>
                    </select>
                    <span class="ml-2">TRACK C // PERCUSSION</span>
                </div>
                <div class="flex flex-wrap items-center gap-6">
                    <label class="text-[10px] txt-dim flex items-center gap-2" title="How long the snare/hat rings">NOISE DECAY <input type="range" id="drumNoiseDecay" min="0.01" max="0.25" value="0.05" step="0.01" class="w-16"></label>
                    <label class="text-[10px] txt-dim flex items-center gap-2">KICK PITCH <input type="range" id="kickPitch" min="100" max="250" value="150" class="w-16"></label>
                </div>
            </div>
            <div class="flex overflow-x-auto w-full" id="gridDrums"></div>
        </div>
    </div>

    <script>
        let audioCtx, isPlaying = false, nextNoteTime = 0, timerID;
        const lookahead = 25.0, scheduleAheadTime = 0.1, baseFreq = 65.41, NUM_STEPS = 16;
        let rootNoteOffset = 0, globalPitchBend = 0;

        // Tracks now store their own playhead (step), direction (dir), and play mode (mode)
        const tracks = {
            A: {
                muted: false, wave: 'sawtooth', step: 0, dir: 1, mode: 'forward',
                pitch:  [12, 0, 12, 0, 15, 0, 12, 0, 19, 0, 15, 0, 12, 0, 15, 0],
                filter: [80, 0, 40, 0, 80, 0, 40, 0, 100, 0, 80, 0, 40, 0, 80, 0],
                elements: []
            },
            B: {
                muted: false, wave: 'square', step: 0, dir: 1, mode: 'forward',
                pitch:  [0, 0, 0, 0, 3, 3, 3, 3, 7, 7, 7, 7, 5, 5, 5, 5],
                filter: [40, 40, 60, 40, 40, 40, 60, 40, 50, 50, 80, 50, 40, 40, 60, 40],
                elements: []
            },
            Drums: {
                muted: false, step: 0, dir: 1, mode: 'forward',
                kick:   [true, false, false, false, true, false, false, false, true, false, false, false, true, false, false, false],
                snare:  [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, false],
                hat:    [0, 60, 40, 60, 0, 60, 40, 60, 0, 60, 40, 60, 0, 60, 40, 60],
                elements: []
            }
        };

        function renderSynthGrid(containerId, trackData, trackId) {
            const container = document.getElementById(containerId);
            for (let i = 0; i < NUM_STEPS; i++) {
                const col = document.createElement('div');
                col.className = 'step-col';
                col.innerHTML = `
                    <div class="led"></div>
                    <span class="text-[9px] txt-dim mt-[-4px]">${(i+1).toString().padStart(2, '0')}</span>
                    <input type="number" class="pitch-input mt-1" data-track="${trackId}" data-step="${i}" data-param="pitch" value="${trackData.pitch[i]}" title="Pitch Offset">
                    <input type="range" class="vertical mt-2" orient="vertical" data-track="${trackId}" data-step="${i}" data-param="filter" min="0" max="100" value="${trackData.filter[i]}" title="Filter Cutoff Mod">
                `;
                container.appendChild(col);
                trackData.elements.push(col);
            }
        }

        function renderDrumGrid(containerId, trackData, trackId) {
            const container = document.getElementById(containerId);
            for (let i = 0; i < NUM_STEPS; i++) {
                const col = document.createElement('div');
                col.className = 'step-col';
                col.innerHTML = `
                    <div class="led"></div>
                    <span class="text-[9px] txt-dim mt-[-4px] mb-1">${(i+1).toString().padStart(2, '0')}</span>
                    <label class="w-full relative" title="Kick"><input type="checkbox" data-track="${trackId}" data-step="${i}" data-param="kick" ${trackData.kick[i] ? 'checked' : ''}><div class="drum-pad">K</div></label>
                    <label class="w-full relative" title="Snare"><input type="checkbox" data-track="${trackId}" data-step="${i}" data-param="snare" ${trackData.snare[i] ? 'checked' : ''}><div class="drum-pad">S</div></label>
                    <input type="range" class="vertical mt-2 h-[40px]" orient="vertical" data-track="${trackId}" data-step="${i}" data-param="hat" min="0" max="100" value="${trackData.hat[i]}" title="Hi-Hat Volume">
                `;
                container.appendChild(col);
                trackData.elements.push(col);
            }
        }

        renderSynthGrid('gridA', tracks.A, 'A');
        renderSynthGrid('gridB', tracks.B, 'B');
        renderDrumGrid('gridDrums', tracks.Drums, 'Drums');

        // Mute Buttons
        document.querySelectorAll('.mute-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const trackId = e.target.dataset.track;
                tracks[trackId].muted = !tracks[trackId].muted;
                if (tracks[trackId].muted) {
                    e.target.classList.remove('bg-black', 'text-[#00ff41]');
                    e.target.classList.add('bg-[#00ff41]', 'text-black');
                    e.target.innerText = '[ MUTED ]';
                } else {
                    e.target.classList.remove('bg-[#00ff41]', 'text-black');
                    e.target.classList.add('bg-black', 'text-[#00ff41]');
                    e.target.innerText = '[ MUTE ]';
                }
            });
        });

        // Data Randomizer Buttons
        document.querySelectorAll('.rand-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const trackId = e.target.dataset.track;
                const trackData = tracks[trackId];
                
                for (let i = 0; i < NUM_STEPS; i++) {
                    if (trackId === 'A' || trackId === 'B') {
                        trackData.pitch[i] = Math.random() > 0.4 ? Math.floor(Math.random() * 24) : 0;
                        trackData.filter[i] = Math.floor(Math.random() * 100);
                        const col = trackData.elements[i];
                        col.querySelector('[data-param="pitch"]').value = trackData.pitch[i];
                        col.querySelector('[data-param="filter"]').value = trackData.filter[i];
                    } else if (trackId === 'Drums') {
                        trackData.kick[i] = Math.random() > 0.70;
                        trackData.snare[i] = Math.random() > 0.85;
                        trackData.hat[i] = Math.random() > 0.3 ? Math.floor(Math.random() * 100) : 0;
                        const col = trackData.elements[i];
                        col.querySelector('[data-param="kick"]').checked = trackData.kick[i];
                        col.querySelector('[data-param="snare"]').checked = trackData.snare[i];
                        col.querySelector('[data-param="hat"]').value = trackData.hat[i];
                    }
                }
            });
        });

        // Individual Track Mode Selectors
        document.querySelectorAll('.track-mode-select').forEach(select => {
            select.addEventListener('change', (e) => {
                const trackId = e.target.dataset.track;
                tracks[trackId].mode = e.target.value;
            });
        });

        // Master Mode Selector (overrides all tracks)
        document.getElementById('masterPlayMode').addEventListener('change', (e) => {
            const newMode = e.target.value;
            ['A', 'B', 'Drums'].forEach(trackId => {
                tracks[trackId].mode = newMode;
                document.querySelector(`.track-mode-select[data-track="${trackId}"]`).value = newMode;
            });
        });

        const pitchWheel = document.getElementById('pitchWheel');
        pitchWheel.addEventListener('input', (e) => globalPitchBend = parseFloat(e.target.value));
        const snapPitchWheel = () => { pitchWheel.value = 0; globalPitchBend = 0; };
        pitchWheel.addEventListener('mouseup', snapPitchWheel);
        pitchWheel.addEventListener('touchend', snapPitchWheel);
        pitchWheel.addEventListener('mouseleave', (e) => { if (e.buttons > 0) snapPitchWheel(); });

        document.querySelectorAll('.wave-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const target = e.currentTarget, trackId = target.dataset.track, waveType = target.dataset.wave;
                tracks[trackId].wave = waveType;
                document.querySelectorAll(`#waveGroup${trackId} .wave-btn`).forEach(b => b.classList.remove('active'));
                target.classList.add('active');
            });
        });

        document.body.addEventListener('input', (e) => {
            if(!e.target.dataset.track || e.target.id === 'pitchWheel' || e.target.classList.contains('track-mode-select')) return;
            const track = e.target.dataset.track, step = parseInt(e.target.dataset.step), param = e.target.dataset.param;
            tracks[track][param][step] = e.target.type === 'checkbox' ? e.target.checked : parseFloat(e.target.value) || 0;
        });

        const keyboardContainer = document.getElementById('keyboard');
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        notes.forEach((note, index) => {
            const btn = document.createElement('button');
            const activeStyle = index === 0 ? 'bg-[#00ff41] text-black' : 'bg-black text-[#00ff41] hover:bg-[#003300]';
            btn.className = `flex-1 text-[9px] font-bold border border-[#00ff41] transition-colors ${activeStyle}`;
            btn.innerText = note;
            btn.dataset.offset = index;
            btn.addEventListener('click', (e) => {
                rootNoteOffset = parseInt(e.target.dataset.offset);
                Array.from(keyboardContainer.children).forEach(child => {
                    child.classList.remove('bg-[#00ff41]', 'text-black');
                    child.classList.add('bg-black', 'text-[#00ff41]');
                });
                e.target.classList.remove('bg-black', 'text-[#00ff41]');
                e.target.classList.add('bg-[#00ff41]', 'text-black');
            });
            keyboardContainer.appendChild(btn);
        });

        let noiseBuffer = null;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = audioCtx.sampleRate * 2;
            noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
        }

        function playSynthVoice(trackData, step, time, octaveCtrlId, decayCtrlId, cutoffCtrlId, noiseCtrlId) {
            if (trackData.muted) return; 
            if (trackData.filter[step] <= 0 && trackData.pitch[step] === 0) return; 
            
            const filter = audioCtx.createBiquadFilter(), env = audioCtx.createGain();
            const baseCutoff = parseFloat(document.getElementById(cutoffCtrlId).value);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(baseCutoff + ((trackData.filter[step] / 100) * 4000), time);
            filter.frequency.exponentialRampToValueAtTime(Math.max(50, baseCutoff), time + 0.1);
            filter.Q.value = trackData.wave === 'square' ? 2 : 6; 
            
            const decay = parseFloat(document.getElementById(decayCtrlId).value);
            env.gain.setValueAtTime(0, time);
            const peakVol = (trackData.wave === 'sawtooth' || trackData.wave === 'square') ? 0.4 : 0.6;
            env.gain.linearRampToValueAtTime(peakVol, time + 0.01); 
            env.gain.exponentialRampToValueAtTime(0.01, time + decay);
            
            filter.connect(env); env.connect(audioCtx.destination);

            const osc = audioCtx.createOscillator();
            osc.type = trackData.wave;
            const octaveShift = parseInt(document.getElementById(octaveCtrlId).value);
            const totalPitch = trackData.pitch[step] + (octaveShift * 12) + rootNoteOffset + globalPitchBend;
            osc.frequency.value = baseFreq * Math.pow(2, totalPitch / 12);
            osc.connect(filter); osc.start(time); osc.stop(time + decay + 0.1);

            const noiseMix = parseFloat(document.getElementById(noiseCtrlId).value);
            if (noiseMix > 0) {
                const noiseSrc = audioCtx.createBufferSource(), noiseGain = audioCtx.createGain();
                noiseSrc.buffer = noiseBuffer; noiseGain.gain.value = noiseMix;
                noiseSrc.connect(noiseGain); noiseGain.connect(filter); 
                noiseSrc.start(time); noiseSrc.stop(time + decay + 0.1);
            }
        }

        function playDrumVoices(step, time) {
            const trackData = tracks.Drums;
            if (trackData.muted) return; 
            
            const nDecay = parseFloat(document.getElementById('drumNoiseDecay').value);

            if (trackData.kick[step]) {
                const kOsc = audioCtx.createOscillator(), kEnv = audioCtx.createGain();
                kOsc.frequency.setValueAtTime(parseFloat(document.getElementById('kickPitch').value), time);
                kOsc.frequency.exponentialRampToValueAtTime(40, time + 0.1);
                kEnv.gain.setValueAtTime(0, time);
                kEnv.gain.linearRampToValueAtTime(0.8, time + 0.005);
                kEnv.gain.exponentialRampToValueAtTime(0.01, time + 0.25);
                kOsc.connect(kEnv); kEnv.connect(audioCtx.destination);
                kOsc.start(time); kOsc.stop(time + 0.3);
            }

            if (trackData.snare[step]) {
                const nSrc = audioCtx.createBufferSource(), nFilt = audioCtx.createBiquadFilter(), nEnv = audioCtx.createGain();
                nSrc.buffer = noiseBuffer; nFilt.type = 'bandpass'; nFilt.frequency.value = 2500;
                nEnv.gain.setValueAtTime(0, time); nEnv.gain.linearRampToValueAtTime(0.6, time + 0.005); 
                nEnv.gain.exponentialRampToValueAtTime(0.01, time + (nDecay * 3)); 
                nSrc.connect(nFilt); nFilt.connect(nEnv); nEnv.connect(audioCtx.destination);
                nSrc.start(time); nSrc.stop(time + (nDecay * 3) + 0.1);
            }

            if (trackData.hat[step] > 0) {
                const hSrc = audioCtx.createBufferSource(), hFilt = audioCtx.createBiquadFilter(), hEnv = audioCtx.createGain();
                hSrc.buffer = noiseBuffer; hFilt.type = 'highpass'; hFilt.frequency.value = 7000;
                hEnv.gain.setValueAtTime(0, time); hEnv.gain.linearRampToValueAtTime((trackData.hat[step] / 100) * 0.4, time + 0.005); 
                hEnv.gain.exponentialRampToValueAtTime(0.01, time + nDecay);
                hSrc.connect(hFilt); hFilt.connect(hEnv); hEnv.connect(audioCtx.destination);
                hSrc.start(time); hSrc.stop(time + nDecay + 0.1);
            }
        }

        // Calculate the next step for a specific track based on its individual mode
        function getNextStepForTrack(trackId) {
            const t = tracks[trackId];
            switch(t.mode) {
                case 'reverse': return (t.step - 1 + NUM_STEPS) % NUM_STEPS;
                case 'pingpong':
                    if (t.dir === 1) {
                        if (t.step >= NUM_STEPS - 1) { t.dir = -1; return t.step - 1; }
                        return t.step + 1;
                    } else {
                        if (t.step <= 0) { t.dir = 1; return t.step + 1; }
                        return t.step - 1;
                    }
                case 'random': return Math.floor(Math.random() * NUM_STEPS);
                case 'forward': default: return (t.step + 1) % NUM_STEPS;
            }
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                
                // Play sounds for current independent steps
                playSynthVoice(tracks.A, tracks.A.step, nextNoteTime, 'octaveA', 'decayA', 'cutoffA', 'noiseA');
                playSynthVoice(tracks.B, tracks.B.step, nextNoteTime, 'octaveB', 'decayB', 'cutoffB', 'noiseB');
                playDrumVoices(tracks.Drums.step, nextNoteTime);
                
                nextNoteTime += 0.25 * (60.0 / parseInt(document.getElementById('tempoSlider').value));
                
                // Capture the current steps locally so the visualizer syncs perfectly with audio
                const stepsToAnimate = { A: tracks.A.step, B: tracks.B.step, Drums: tracks.Drums.step };
                
                requestAnimationFrame(() => { 
                    ['A', 'B', 'Drums'].forEach(trackId => {
                        tracks[trackId].elements.forEach(el => el.classList.remove('active'));
                        tracks[trackId].elements[stepsToAnimate[trackId]].classList.add('active');
                    });
                });
                
                // Advance each track's step independently
                ['A', 'B', 'Drums'].forEach(trackId => {
                    tracks[trackId].step = getNextStepForTrack(trackId);
                });
            }
            timerID = window.setTimeout(scheduler, lookahead);
        }

        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            initAudio();
            if (isPlaying) {
                window.clearTimeout(timerID); isPlaying = false; 
                playBtn.innerText = '[ PLAY ]';
                playBtn.classList.remove('bg-[#00ff41]', 'text-black');
                ['A', 'B', 'Drums'].forEach(trackId => tracks[trackId].elements.forEach(el => el.classList.remove('active')));
            } else {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                isPlaying = true; 
                
                // Reset all playheads based on their individual modes
                ['A', 'B', 'Drums'].forEach(trackId => {
                    if (tracks[trackId].mode === 'reverse') tracks[trackId].step = NUM_STEPS - 1;
                    else if (tracks[trackId].mode === 'random') tracks[trackId].step = Math.floor(Math.random() * NUM_STEPS);
                    else tracks[trackId].step = 0;
                    tracks[trackId].dir = 1;
                });
                
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler(); 
                playBtn.innerText = '[ STOP ]';
                playBtn.classList.add('bg-[#00ff41]', 'text-black');
            }
        });

        document.getElementById('tempoSlider').addEventListener('input', (e) => document.getElementById('tempoDisplay').innerText = e.target.value);
    </script>
</body>
</html>
